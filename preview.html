<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>點工派遣</title>
<meta name="theme-color" content="#3D6EA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="點工派遣">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--blue:#5B9BD5;--blueL:#EAF4FC;--purple:#7c3aed;--purpleL:#ede9fe;--ok:#16a34a;--warn:#f59e0b;--red:#ef4444;--ink:#1f2937;--mut:#6b7280;--line:#e5e7eb;--bg:#DCDAD2;--nav:62px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:#DCDAD2;}
body{font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px));}
/* app bar */
.appbar{background:#5B9BD5;color:#fff;position:sticky;top:0;z-index:30;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;}
.appbar .t{font-size:19px;font-weight:800;text-align:center;}
.appbar .sub{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:15px;opacity:.95;}
.appbar .sub button{background:rgba(255,255,255,.18);border:0;color:#fff;border-radius:0;padding:5px 12px;font-size:15px;}
/* bottom nav */
.bottomnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;border-top:1px solid var(--line);display:flex;z-index:40;box-shadow:0 -2px 10px rgba(0,0,0,.05);}
.navitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:12.5px;color:#94a3b8;cursor:pointer;}
.navitem.on{color:var(--blue);}
.navitem svg{width:24px;height:24px;}
.wrap{padding:12px;max-width:1320px;margin:0 auto;}
button{font-family:inherit;cursor:pointer;}
.btn{border:1px solid #9DC3E6;background:#fff;border-radius:0;padding:8px 14px;font-size:14px;color:#374151;min-height:36px;}
.btn:active{background:#f1f5f9;}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.green{background:#f0fdf4;color:#15803d;border-color:#86efac;}
.btn.sm{padding:6px 11px;font-size:15px;min-height:34px;}
.btn.danger{color:#b91c1c;border-color:#fca5a5;background:#fff5f5;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.spacer{flex:1;}
.muted{color:var(--mut);}
input,select,textarea{font-family:inherit;font-size:16px;padding:9px 10px;border:1px solid #9DC3E6;border-radius:0;background:#fff;}
input[type=checkbox]{width:20px;height:20px;}
.seg{display:inline-flex;background:#f1f5f9;border-radius:0;padding:3px;}
.seg button{border:0;background:transparent;padding:6px 14px;border-radius:0;font-weight:600;color:#94a3b8;min-height:30px;font-size:15px;}
.seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 2px rgba(0,0,0,.1);}
/* D0707-02：工單工具列 C(分段控制器)＋D(彩色圖示鈕) 混搭 */
.seg.big{background:#C9DCEE;padding:4px;border-radius:0;}
.seg.big button{font-size:14px;padding:8px 18px;min-height:38px;border-radius:0;}
.seg.big button.on{background:#0d9488;color:#fff;box-shadow:0 1px 3px rgba(13,148,136,.45);}
.pillb{border:0;border-radius:0;padding:0 18px;min-height:40px;font-size:14px;font-weight:700;color:#fff;display:inline-flex;align-items:center;gap:6px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.18);}
.pillb:active{transform:translateY(1px);}
.pillb.red{background:#dc2626;}.pillb.blue{background:#5B9BD5;}
.tglb{border:1.5px solid #9DC3E6;background:#fff;border-radius:0;padding:0 13px;min-height:38px;font-size:15px;font-weight:600;color:#475569;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.tglb.on{background:#ecfeff;border-color:#22d3ee;color:#0e7490;}
.tglb.amber.on{background:#fffbeb;border-color:#fcd34d;color:#92400e;}
.tglb.rose.on{background:#fef2f2;border-color:#fca5a5;color:#b91c1c;}
.fs-seg{display:inline-flex;background:#C9DCEE;border-radius:0;padding:3px;align-items:center;}
.fs-seg button{border:0;background:transparent;min-height:34px;padding:0 12px;border-radius:0;font-size:15px;font-weight:600;color:#475569;cursor:pointer;}
.fs-seg button.on{background:#06b6d4;color:#fff;box-shadow:0 1px 2px rgba(6,182,212,.4);}
.card{background:#fff;border-radius:0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.note{background:#fffbeb;border:1px solid #fde68a;border-radius:0;padding:8px 11px;font-size:15px;color:#78350f;margin-bottom:10px;}
/* people */
.grid-people{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:0;padding:11px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.pcard .thumb{width:42px;height:42px;border-radius:0;object-fit:cover;background:#eef2f6;border:1px dashed #9DC3E6;display:inline-flex;align-items:center;justify-content:center;color:#9ca3af;font-size:12.5px;}
.pcard .ph-head{display:flex;gap:10px;align-items:flex-start;}
.pcard .nm{font-weight:700;font-size:16px;}
.badge{display:inline-block;font-size:12.5px;padding:1px 7px;border-radius:0;background:#e0f2fe;color:#0369a1;margin-left:4px;}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;margin-right:5px;}
.star{color:var(--warn);}
.pexp{margin-top:9px;border-top:1px solid var(--line);padding-top:9px;font-size:14px;display:none;}
.pcard.open .pexp{display:block;}
.kv{margin:4px 0;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:15px;padding:4px 11px;border-radius:0;background:#C9DCEE;color:#334155;margin:3px 4px 3px 0;}
.chip.lead{background:#fef3c7;color:#92400e;}
.chip.mac{background:#ecfeff;color:#155e75;}
.chip.over{background:#fee2e2;color:#b91c1c;}
table{border-collapse:collapse;width:100%;background:#fff;border-radius:0;overflow:hidden;}
th,td{border:1px solid var(--line);padding:8px;text-align:left;font-size:14px;}
th{background:#C9DCEE;}
/* board */
.staging{background:#fff;border:1px solid #f1e8d8;border-left:4px solid #fbbf24;border-radius:0;padding:11px;margin-bottom:12px;}
.stg-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.stg{min-width:250px;max-width:250px;background:#fff;border:1px solid #eef2f7;border-left:3px solid #ef4444;border-radius:0;padding:9px 10px;font-size:15px;}
.stg.soon{border-left-color:#f59e0b;}
.bhdr td{background:#EAF4FC;color:#26476b;font-weight:700;font-size:13.5px;padding:4px 10px;}
.rchip{border:0;font-size:12.5px;font-weight:700;padding:5px 13px;border-radius:0;cursor:pointer;}
.rchip.ri{background:#EAF4FC;color:#26476b;}
.rchip.rr{background:#ede9fe;color:#5b21b6;}
.rchip.kd{background:#fef3c7;color:#92400e;}
.rchip.kc{background:#dcfce7;color:#166534;}
.rchip.off{opacity:.35;}
.bp{border:1px solid #9DC3E6;background:#fff;color:#475569;font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:0;cursor:pointer;}
.bp.on{background:#5B9BD5;color:#fff;border-color:#5B9BD5;}
.stg-grp{display:inline-flex;align-items:center;gap:5px;border:1px solid #bfdbfe;background:#f6faff;border-radius:0;padding:3px 8px 3px 6px;}
.stg-grp-lbl{font-size:11.5px;color:#64748b;writing-mode:horizontal-tb;white-space:nowrap;}
.stg-lead{color:#b45309;font-size:15px;font-weight:700;margin:0 -2px;}
.board{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:820px){.board{grid-template-columns:1fr !important;}}
.col h2{font-size:15px;margin:0 0 10px;padding:11px 14px;border-radius:0;color:#fff;display:flex;align-items:center;gap:8px;font-weight:700;}
.col h2 .cnt{margin-left:auto;font-size:12.5px;font-weight:400;opacity:.85;}
.col.d0 h2{background:#5B9BD5;}
.col.d1 h2{background:#7c3aed;}
.col.d2 h2{background:#0d9488;}
.wcard{background:#fbfcfe;border:1px solid #C9DCEE;border-radius:0;padding:12px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.wcard.bad{background:#fff;border-color:#fca5a5;}
.seq.warn{background:var(--red);}
.wcard .wh{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.seq{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;}
.mgr{width:26px;height:26px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:13.5px;}
.slot{font-size:13.5px;padding:3px 10px;border-radius:0;background:#fde68a;color:#92400e;}
.cross{font-size:13.5px;padding:3px 10px;border-radius:0;background:#ddd6fe;color:#5b21b6;}
.idtag{color:#9ca3af;font-size:15px;margin-left:auto;}
.drop.dragover{outline:2px dashed var(--blue);background:#f0f7ff;}
.warn-txt{color:#dc2626;font-weight:700;font-size:15px;}
.ok-txt{color:var(--ok);font-weight:700;font-size:15px;}
.people-strip{display:flex;gap:7px;flex-wrap:wrap;background:#F2F7FC;border:1px solid var(--line);border-radius:0;padding:9px;margin-bottom:10px;}
.pchip{background:#fff;border:1px solid #d1d5db;border-radius:0;padding:7px 12px;font-size:15px;cursor:grab;}
/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.mask.on{display:flex;}
.modal{background:#fff;border-radius:0 18px 0 0;max-width:600px;width:100%;max-height:92vh;overflow:auto;padding:18px 16px calc(20px + env(safe-area-inset-bottom,0px));}
@media(min-width:700px){.mask{align-items:center;}.modal{border-radius:0;}}
.modal h3{margin:0 0 12px;}
.fld{margin-bottom:11px;display:flex;flex-direction:column;gap:5px;}
.fld label{font-size:15px;color:#374151;font-weight:600;}
.fld input,.fld select,.fld textarea{width:100%;}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.flex2 .fld{min-width:0;}
.fld input,.fld select,.fld textarea{min-width:0;max-width:100%;}
input[type=date],input[type=time]{min-width:0;width:100%;}
.pick-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;}
/* V0.3 */
.pill{border:1px solid #9DC3E6;background:#fff;border-radius:0;padding:7px 13px;font-size:13.5px;color:#64748b;font-weight:600;min-height:34px;}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.dnum{font-size:13.5px;padding:2px 8px;border-radius:0;background:#f1f5f9;border:1px solid #9DC3E6;color:#334155;font-weight:600;white-space:nowrap;}
.samebadge{font-size:12.5px;padding:2px 8px;border-radius:0;background:#fce7f3;color:#9d174d;white-space:nowrap;}
.srcbadge{font-size:12.5px;padding:3px 8px;border-radius:0;cursor:pointer;border:0;white-space:nowrap;}
.srcbadge.chg{background:#fef3c7;color:#92400e;}
.srcbadge.done{background:#dcfce7;color:#166534;}
.prow{background:#fff;border:1px solid var(--line);border-radius:0;padding:11px;margin-bottom:10px;display:flex;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.prow .pinfo{width:160px;flex:none;display:flex;gap:9px;align-items:flex-start;}
.prow .pitems{flex:1;min-width:0;}
.pitem{background:#F2F7FC;border:1px solid #C9DCEE;border-radius:0;padding:8px 10px;margin-bottom:6px;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;cursor:pointer;}
.slotpill{font-size:13.5px;padding:2px 9px;border-radius:0;flex:none;white-space:nowrap;}
.slotpill.am{background:#dcfce7;color:#166534;}.slotpill.pm{background:#fee2e2;color:#991b1b;}.slotpill.full{background:#EAF4FC;color:#26476b;}.slotpill.cus{background:#e0e7ff;color:#3730a3;}
.avat{width:42px;height:42px;border-radius:50%;background:#EAF4FC;color:#26476b;display:inline-flex;align-items:center;justify-content:center;font-size:15px;flex:none;}
.unassigned{background:#fff7ed;border:1px solid #fdba74;border-radius:0;padding:11px;margin-bottom:10px;}
.dayhdr{font-size:15px;margin:0 0 10px;padding:11px 14px;border-radius:0;background:#5B9BD5;color:#fff;font-weight:700;display:flex;align-items:center;gap:8px;}
.dayhdr.d1{background:#7c3aed;}
.dayhdr.d2{background:#0d9488;}
.dayhdr .btn{background:rgba(255,255,255,.18);color:#fff;border:0;}
.dayhdr .spacer{flex:1;}
.stg-sec{margin-top:6px;}
.stg-sec .sechdr{font-weight:700;font-size:15px;cursor:pointer;padding:5px 0;user-select:none;}
@media(max-width:560px){.prow{flex-direction:column;gap:8px}.prow .pinfo{width:auto;}}
/* V0.5 groups */
.groups{background:#fff;border:1px solid #C9DCEE;border-left:5px solid #7c3aed;border-radius:0;padding:11px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.gwrap{display:flex;gap:10px;flex-wrap:wrap;margin-top:9px;}
.gcard{background:#faf5ff;border:1px solid #ddd6fe;border-radius:0;padding:10px;min-width:210px;max-width:280px;}
.gcard .gname{font-weight:700;color:#5b21b6;font-size:14.5px;}
.gdrop{border:2px dashed #94a3b8;border-radius:0;min-width:190px;display:flex;align-items:center;justify-content:center;text-align:center;color:#64748b;font-size:12.5px;padding:10px;background:#F2F7FC;}
.gdrop.dragover,.gcard.dragover{outline:2px dashed var(--purple);background:#f5f3ff;}
.gchip{background:#ede9fe;border:1px solid #c4b5fd;color:#5b21b6;border-radius:0;padding:7px 12px;font-size:15px;cursor:grab;font-weight:700;}
.gbadge{display:inline-block;font-size:10.5px;padding:1px 6px;border-radius:0;background:#ede9fe;color:#5b21b6;margin-left:4px;vertical-align:middle;}
.gapply{background:#ede9fe;border:0;color:#5b21b6;font-weight:700;border-radius:0;padding:7px 13px;font-size:15px;cursor:pointer;}
#loginMask{background:#1e293b;align-items:center;}
#loginMask .modal{max-width:360px;text-align:center;border-radius:0;margin:14px;}

/* D0724-02 大框分割＋去陰影：外層一大框、內層卡片改分隔線（比照 G95 V0717-08 合併大框偏好） */
.card,.pcard,.prow,.wcard,.note{box-shadow:none!important}
.wcard{border:1px solid #C9DCEE;background:#fff;margin-bottom:12px}
.wcard .prow{border:none;border-top:1px solid #DDE7F0;margin-bottom:0;background:transparent}
.wcard .prow:first-of-type{border-top:none}
.pcard{border:1px solid #D8E4EF;margin-bottom:-1px;background:#fff}

/* D0724-03 ②手機頂列鎖一列（比照 G95 V0724-05） */
.sub{flex-wrap:nowrap;overflow:hidden}
.sub>*{white-space:nowrap;flex:none}
@media(max-width:560px){.sub{font-size:12.5px;gap:7px}}
</style>
</head>
<body>
<div class="appbar">
  <div class="t" id="appTitle">點工派遣</div>
  <div class="sub"><span id="who"></span><span id="syncTag" style="font-size:13.5px"></span><span onclick="dispForceResync()" style="cursor:pointer;font-size:13.5px;opacity:.9" title="強制重抓雲端資料：清掉這台的離線快取後重新整理。畫面和別人對不上時用（不會刪雲端、不會登出）"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>重抓</span><span onclick="window.open('https://nasajetta-create.github.io/G95/manual/','_blank')" style="cursor:pointer;font-size:12px;opacity:.9" title="開啟使用說明書（與 G95 共用；點工派遣章節撰寫中）"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4H6.5A2.5 2.5 0 0 0 4 6.5v13z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-2.5"/></svg> 說明</span><button id="logoutBtn" style="display:none">登出</button><span id="verTag">D0724-03</span></div>
</div>

<div class="wrap">
  <div class="note" id="cloudNote">雲端版：資料即時同步（人員/機具/小組/管理人＝公司層全工地共用；派工單＝本工地）。真實帶入 G95 候選待 B 階段。</div>
  <div id="roBanner" style="display:none;background:#fee2e2;border:1px solid #fca5a5;border-radius:0;padding:9px 12px;font-size:15px;color:#991b1b;margin-bottom:10px"></div>
  <div id="bkBanner" style="display:none;background:#fef3c7;border:1px solid #fcd34d;border-radius:0;padding:9px 12px;font-size:15px;color:#92400e;margin-bottom:10px">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M21 8l-9-5-9 5v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg> 週一提醒：請備份上週資料（工單只保留近 10 天）
    <button class="btn sm" id="bkNow" style="margin-left:8px;background:#f59e0b;color:#fff;border-color:#f59e0b">一鍵備份</button>
    <button class="btn sm" id="bkLater" style="margin-left:4px">稍後</button>
  </div>
  <div id="dispHealth" style="display:none;background:#fef9c3;border:1px solid #fde047;border-radius:0;padding:9px 12px;font-size:15px;color:#854d0e;margin-bottom:10px">
    <span id="dispHealthTxt"></span>
    <button class="btn sm" id="dispHealthBk" style="margin-left:8px;background:#f59e0b;color:#fff;border-color:#f59e0b">先備份</button>
    <button class="btn sm" id="dispHealthOk" style="margin-left:4px">我知道了</button>
  </div>

  <!-- BOARD -->
  <section id="pane-board">
    <div id="ctrlRows">
    <div class="row" style="margin-bottom:10px;row-gap:8px">
      <span id="dayPills" class="row" style="gap:6px;flex-wrap:nowrap"></span>
      <div class="seg" id="vmSeg"><button data-vm="work" class="on">依工作</button><button data-vm="person">依人員</button></div>
      <div class="seg" id="viewSeg"><button data-v="card" class="on">卡片</button><button data-v="list">條列</button></div>
      <button class="btn sm" id="layoutBtn" title="兩天欄排列方式">⬌ 並排</button>
      <button class="btn sm" id="grpBtn" title="管理常用小組"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="9" cy="7" r="3"/><path d="M3 20v-1a6 6 0 0 1 12 0v1"/><circle cx="17" cy="8" r="2.5"/><path d="M14.5 20v-1a5 5 0 0 1 7 0v1"/></svg> 小組</button>
      <span class="spacer"></span>
      <button class="btn sm" id="exportPdf">PDF</button>
      <select id="capScope" class="btn sm"></select>
      <button class="btn sm" id="capBtn">截圖</button>
    </div>
    </div>

    <div id="fwdBanner" class="no-print" style="display:none;background:#fef3c7;border:1px solid #f59e0b;border-radius:0;padding:9px 12px;font-size:15px;color:#92400e;margin-bottom:10px"></div>

    <div class="staging" id="staging">
      <div class="row">

// D0706-01：G95 欄位文件解讀——相容 gzip 壓縮 {z:base64}（G95 V0706-04 起）與舊 {d:純JSON}
function _g95Dec(data){
  if(!data)return Promise.resolve(null);
  if(typeof data.z==='string'){
    try{
      var bin=atob(data.z);var bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      var dstream=new DecompressionStream('gzip');var w=dstream.writable.getWriter();w.write(bytes);w.close();
      return new Response(dstream.readable).arrayBuffer().then(function(buf){try{return JSON.parse(new TextDecoder().decode(buf));}catch(e){return null;}});
    }catch(e){console.warn('g95 z dec',e);return Promise.resolve(null);}
  }
  if(typeof data.d==='string'){try{return Promise.resolve(JSON.parse(data.d));}catch(e){return Promise.resolve(null);}}
  return Promise.resolve(null);
}
var _g95Mode='';   // D0721-02：''=未定 / 'cands'=讀精簡候選文件 / 'defects'=退回整包
function _g95ApplyCands(list){
  var arr=Array.isArray(list)?list:[];
  window._g95CandList=arr;
  var by={};for(var i=0;i<arr.length;i++){var c=arr[i];if(c&&c.refId!=null)by[String(c.refId)]=c;}
  window._g95CandById=by;
  window._g95CandReady=true;
  _rerender();
}
function _g95SubscribeDefects(){
  // 退回法（D0718-01）：dispatch_cands 文件不存在（G95 尚未上 D0721-02）時，改讀整包 defects。
  var defectsCol=window._fb.collection(window._fb.doc(window._fb.db,'projects','main'),'defects');
  window._fb.onSnapshot(defectsCol,function(snap){
    var out=[];
    snap.forEach(function(ds){
      var x=ds.data(); if(!x||x.del) return;                 // 墓碑(刪除)→排除
      var row=x.d; if(!row||typeof row!=='object') return;
      if(x.st==='d' && !row.actualDone){                      // 完成→補 actualDone＝_g95Cands 會跳過、srcStatus 判定 done
        row=Object.assign({},row); row.actualDone=(row.planDone||todayISO());
      }
      out.push(row);
    });
    window._g95Rows=out; _rerender();
  },function(e){console.warn('g95 defects snap',e);});
}
function _g95Subscribe(){
  // D0721-02：優先讀 G95 存檔時算好的精簡候選文件 _fields/dispatch_cands（讀 1 份取代整包 defects ~8000 筆）。
  // 文件不存在＝G95 尚未上新版→退回讀整包 defects（_g95SubscribeDefects，維持 D0718-01 行為）＝可平滑上線。
  var candRef=window._fb.doc(window._fb.db,'projects','main','_fields','dispatch_cands');
  var fellBack=false;
  window._fb.onSnapshot(candRef,function(ds){
    if(ds.exists()){
      _g95Mode='cands';
      try{window._g95CandsMt=ds.data()._mt||0;}catch(e){window._g95CandsMt=0;}
      _g95Dec(ds.data()).then(function(list){ _g95ApplyCands(list||[]); });
    }else{
      if(!fellBack){fellBack=true;_g95Mode='defects';_g95SubscribeDefects();}
    }
  },function(e){console.warn('g95 cands snap',e);if(!fellBack){fellBack=true;_g95Mode='defects';_g95SubscribeDefects();}});
  var metaRef=window._fb.doc(window._fb.db,'projects','main','_fields','meta');
  window._fb.onSnapshot(metaRef,function(ds){
    var d=ds.exists()?ds.data():null;
    _g95Dec(d).then(function(m){
      if(!m)return;
      window._g95VendorFlags=(m.vendorFlags&&typeof m.vendorFlags==='object')?m.vendorFlags:null; // D0705-01：G95 點工廠商旗標
      var dirty=false;
      if(Array.isArray(m.vendors)&&m.vendors.length){
        var j=JSON.stringify(m.vendors);
        if(j!==JSON.stringify(DS.vendors||[])){DS.vendors=m.vendors.slice();dirty=true;}
      }
      if(Array.isArray(m.managers)){
        DS.managers=DS.managers||[];
        m.managers.forEach(function(name){
          if(!name)return;
          if(!DS.managers.some(function(x){return x.name===name;})){DS.managers.push({id:'g95_'+name,name:String(name),phone:'',note:'（G95 同步）'});dirty=true;}
        });
      }
      if(dirty){save();_rerender();}
    });
  },function(e){console.warn('g95 meta snap',e);});
}
function _g95RowBy(refId){
  var rows=window._g95Rows;if(!rows)return null;

function _g95Cands(){
  if(_g95Mode==='cands')return window._g95CandReady?(window._g95CandList||[]):null; // D0721-02：直接用 G95 算好的候選
  var rows=window._g95Rows;
  if(!rows||!rows.length)return null;
  var out=[];
  rows.forEach(function(r){
    if(r.actualDone)return;
    var v=String(r.vendor||'');
    // D0705-01：優先看 G95「點工廠商旗標」(vendorFlags)；廠商沒設過旗標時 fallback 舊規則=名字含「點工」
    var vf=window._g95VendorFlags;

function srcStatus(it){
  if(!it.refId)return{done:false,chg:false};
  if(!it._live)return{done:!!it.srcDone,chg:!!it.srcChanged}; // 示範/舊資料不跟真實 G95 比對(防假#號撞真實列)
  if(_g95Mode==='cands'){ // D0721-02：候選文件模式——用候選清單判定完成/變更
    if(!window._g95CandReady)return{done:!!it.srcDone,chg:!!it.srcChanged};
    var cc=(window._g95CandById||{})[String(it.refId)];
    if(!cc)return{done:true,chg:false};   // 不在開放候選＝已完成/刪除/移出點工→銷項（等同舊法 actualDone）
    var sc=it.src||{};
    var content2=(cc.content||'')+(cc.note?'（'+cc.note+'）':'');
    return{done:false,chg:(sc.content||'')!==content2||(sc.unit||'')!==(cc.unit||'')||(sc.vendor||'')!==(cc.vendor||''),content:content2,unit:(cc.unit||''),vendor:(cc.vendor||'')};
  }
  var r=_g95RowBy(it.refId);
  if(!r)return{done:!!it.srcDone,chg:!!it.srcChanged};
  if(r.actualDone)return{done:true,chg:false};
  var s=it.src||{};
  var c=_g95RowContent(r),u=_g95RowUnit(r),v=String(r.vendor||'');
  return{done:false,chg:(s.content||'')!==c||(s.unit||'')!==u||(s.vendor||'')!==v,content:c,unit:u,vendor:v};
}

}

function ageOf(birth){if(!birth)return'';var b=parseISO(birth),n=new Date();var a=n.getFullYear()-b.getFullYear();var m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;return a;}

function mgrColor(name){var pal=['#16a34a','#7c3aed','#0891b2','#db2777','#ea580c','#0d9488'];var s=0;for(var i=0;i<(name||'').length;i++)s+=name.charCodeAt(i);return pal[s%pal.length];}
function slotRange(it){if(it.slotType==='custom'&&it.start&&it.end){var a=it.start.split(':'),b=it.end.split(':');return[(+a[0])*60+(+a[1]),(+b[0])*60+(+b[1])];}if(it.slot==='am')return[480,720];if(it.slot==='pm')return[780,1020];return[480,1020];}

function parseUnit(s){s=String(s||'');var fm=s.match(/(\d+)\s*[Ff]/);var floor=fm?+fm[1]:null;var bm=s.match(/([A-Za-z]+)\s*(\d+)/);if(bm)return{floor:floor,bldg:bm[1].toUpperCase(),num:+bm[2],pub:false};var s2=s.replace(/[·・.\s]*\d+\s*[Ff][\s\S]*$/,'');var tm=s2.match(/([A-Za-z])\s*$/);return{floor:floor,bldg:tm?tm[1].toUpperCase():'',num:999,pub:true};}
function unitCompare(a,b){var pa=parseUnit(a),pb=parseUnit(b);if(pa.bldg!==pb.bldg){if(!pa.bldg)return 1;if(!pb.bldg)return -1;return pa.bldg<pb.bldg?-1:1;}if(pa.num!==pb.num)return pa.num-pb.num;var fa=pa.floor==null?-1:pa.floor,fb=pb.floor==null?-1:pb.floor;if(fa!==fb)return fb-fa;return 0;}

function conflictsFor(day){

function groupCard(g){
  var d=document.createElement('div');d.className='gcard';
  var mem=(g.memberIds||[]).slice().sort(function(a,b){return (b===g.leaderId?1:0)-(a===g.leaderId?1:0);});
  var chips=mem.map(function(pid){var p=personById(pid);if(!p)return'';var lead=pid===g.leaderId;return '<span class="chip'+(lead?' lead':'')+'">'+(lead?'<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 3l2.7 5.8 6.3.7-4.7 4.3 1.3 6.2-5.6-3.2-5.6 3.2 1.3-6.2L2 9.5l6.3-.7z"/></svg>':'')+esc(p.name)+'</span>';}).join('');
  d.innerHTML='<div class="row"><span class="gname">'+esc(g.name)+'</span><span class="spacer"></span><span class="muted" style="font-size:13.5px">'+(g.memberIds||[]).length+'人</span></div>'+
    '<div style="margin:7px 0 9px">'+(chips||'<span class="muted" style="font-size:13.5px">（無成員）</span>')+'</div>'+
    '<div class="row"><button class="btn sm editG">編輯</button><button class="btn sm danger delG">刪除</button></div>';
  d.querySelector('.editG').onclick=function(){editGroup(g.id);};
  d.querySelector('.delG').onclick=function(){if(confirm('刪除小組「'+g.name+'」？（不影響人員資料）')){DS.groups=DS.groups.filter(function(x){return x.id!==g.id;});save();renderGroups();renderPeople();}};
  d.ondragover=function(e){e.preventDefault();d.classList.add('dragover');};
  d.ondragleave=function(){d.classList.remove('dragover');};
  d.ondrop=function(e){e.preventDefault();d.classList.remove('dragover');try{var o=JSON.parse(e.dataTransfer.getData('text/plain'));if(o.personId&&(g.memberIds||[]).indexOf(o.personId)<0){g.memberIds.push(o.personId);save();renderGroups();renderPeople();}}catch(err){}};
  return d;
}
function editGroup(id,presetIds){
  var g=id?groupById(id):{id:'',name:'',memberIds:(presetIds||[]).slice(),leaderId:(presetIds&&presetIds[0])||''};
  if(!g)return;
  var box=document.getElementById('modalBox');
  var rows=DS.people.map(function(p){var on=(g.memberIds||[]).indexOf(p.id)>=0;
    return '<div class="pick-row"><label style="flex:1"><input type="checkbox" class="gm" data-id="'+p.id+'"'+(on?' checked':'')+'> '+esc(p.name)+(p.migrant?' <span class="badge">移工</span>':'')+' <span class="muted" style="font-size:13.5px">'+esc(p.company)+'·'+esc(p.skill)+'</span></label>'+
      '<label class="muted"><input type="radio" name="gl" class="gl" data-id="'+p.id+'"'+(g.leaderId===p.id?' checked':'')+'> <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 3l2.7 5.8 6.3.7-4.7 4.3 1.3 6.2-5.6-3.2-5.6 3.2 1.3-6.2L2 9.5l6.3-.7z"/></svg>組領班</label></div>';}).join('');
  box.innerHTML='<h3>'+(id?'編輯小組':'新增小組')+'</h3>'+
   '<div class="fld"><label>組名（必填）</label><input id="g_name" value="'+esc(g.name)+'"></div>'+
   '<div class="fld"><label>成員（勾選）＋組領班（必選一人）</label><div style="max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:0;padding:6px">'+rows+'</div></div>'+
   '<div class="row"><button class="btn primary" id="saveG">儲存</button><button class="btn" id="cancelM">取消</button>'+(id?'<span class="spacer"></span><button class="btn danger" id="delG"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg> 刪除小組</button>':'')+'</div>';
  box.querySelector('#cancelM').onclick=closeModal;
  var _delG=box.querySelector('#delG');
  if(_delG)_delG.onclick=function(){
    if(!confirm('刪除小組「'+g.name+'」？\n（只解散這個常用小組，人員本身與已派出的工作都不受影響）'))return;
    DS.groups=(DS.groups||[]).filter(function(x){return x.id!==g.id;});
    save();closeModal();renderGroups();renderPeople();if(document.getElementById('pane-board').style.display!=='none')renderBoard();
    toast('已刪除小組「'+g.name+'」','<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>');
  };
  box.querySelector('#saveG').onclick=function(){
    var name=box.querySelector('#g_name').value.trim();
    var mids=[];box.querySelectorAll('.gm').forEach(function(c){if(c.checked)mids.push(c.dataset.id);});
    var lead='';box.querySelectorAll('.gl').forEach(function(r){if(r.checked)lead=r.dataset.id;});
    if(!name){alert('請填組名');return;}
    if(!mids.length){alert('請至少勾一位成員');return;}
    if(!lead||mids.indexOf(lead)<0){alert('請在成員中指定一位組領班（必選）');return;}
    var o={id:g.id||uid(),name:name,memberIds:mids,leaderId:lead};
    if(g.id){DS.groups=DS.groups.map(function(x){return x.id===g.id?o:x;});}else{DS.groups=DS.groups||[];DS.groups.push(o);}
    save();closeModal();renderGroups();renderPeople();if(document.getElementById('pane-board').style.display!=='none')renderBoard();};
  openModal();
}
function manageGroups(){
  var box=document.getElementById('modalBox');
  var list=(DS.groups||[]).map(function(g){
    var names=(g.memberIds||[]).map(function(pid){var p=personById(pid);return p?((pid===g.leaderId?'<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 3l2.7 5.8 6.3.7-4.7 4.3 1.3 6.2-5.6-3.2-5.6 3.2 1.3-6.2L2 9.5l6.3-.7z"/></svg>':'')+p.name):'';}).join('、');
    return '<div class="pick-row"><div style="flex:1"><b style="color:#5b21b6">'+esc(g.name)+'</b><div class="muted" style="font-size:13.5px">'+names+'</div></div><button class="btn sm eG" data-id="'+g.id+'">編輯</button></div>';}).join('');
  box.innerHTML='<h3><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="9" cy="7" r="3"/><path d="M3 20v-1a6 6 0 0 1 12 0v1"/><circle cx="17" cy="8" r="2.5"/><path d="M14.5 20v-1a5 5 0 0 1 7 0v1"/></svg> 常用小組</h3>'+(list||'<p class="muted">尚無小組</p>')+
   '<div class="row" style="margin-top:12px"><button class="btn sm" id="newG" style="background:#7c3aed;color:#fff;border-color:#7c3aed">＋ 新增小組</button><span class="spacer"></span><button class="btn" id="cancelM">關閉</button></div>';
  box.querySelector('#cancelM').onclick=closeModal;
  box.querySelector('#newG').onclick=function(){editGroup('');};
  box.querySelectorAll('.eG').forEach(function(b){b.onclick=function(){editGroup(b.dataset.id);};});
  openModal();
}

/* managers */
function managerById(id){return (DS.managers||[]).filter(function(m){return m.id===id;})[0];}
function renderManagers(){
  var box=document.getElementById('mgrBox');if(!box)return;box.innerHTML='';
  var head=document.createElement('div');head.className='row';
  head.innerHTML='<b><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="12" cy="7" r="4"/><path d="M5 21v-1a7 7 0 0 1 14 0v1"/></svg> 管理人（'+(DS.managers||[]).length+'）</b><span class="spacer"></span><button class="btn sm" id="addMgr" style="background:#0891b2;color:#fff;border-color:#0891b2">＋ 新增管理人</button>';
  head.querySelector('#addMgr').onclick=function(){editManager('');};
  box.appendChild(head);
  var wrap=document.createElement('div');wrap.className='gwrap';
  (DS.managers||[]).forEach(function(m){
    var c=document.createElement('div');c.className='gcard';c.style.cssText='background:#ecfeff;border-color:#a5f3fc';
    c.innerHTML='<div class="row"><span class="mgr" style="width:32px;height:32px;font-size:14px;background:'+mgrColor(m.name)+'">'+esc(mgrCode(m.name))+'</span><div style="flex:1"><div style="font-weight:700">'+esc(m.name)+'</div>'+(m.phone?'<div class="muted" style="font-size:13.5px">'+esc(m.phone)+'</div>':'')+'</div></div>'+
      (m.note?'<div class="muted" style="font-size:13.5px;margin:6px 0 0">備註：'+esc(m.note)+'</div>':'')+
      '<div class="row" style="margin-top:9px"><button class="btn sm eMg">編輯</button><button class="btn sm danger dMg">刪</button></div>';
    c.querySelector('.eMg').onclick=function(){editManager(m.id);};
    c.querySelector('.dMg').onclick=function(){if(confirm('刪除管理人 '+m.name+'？（派工卡上已填的名字不受影響）')){DS.managers=DS.managers.filter(function(x){return x.id!==m.id;});save();renderManagers();}};
    wrap.appendChild(c);
  });
  if(!(DS.managers||[]).length){var e=document.createElement('span');e.className='muted';e.style.fontSize='12.5px';e.textContent='（尚無管理人）';wrap.appendChild(e);}
  box.appendChild(wrap);
  var tip=document.createElement('div');tip.className='muted';tip.style.cssText='font-size:13.5px;margin-top:7px';
  tip.textContent='管理人不會出現在派遣人力池；圓點色＝派工卡上的管理人徽章色。接雲端後自動同步 G95 管理人員。';
  box.appendChild(tip);
}
function editManager(id){
  var m=id?managerById(id):{id:'',name:'',phone:'',note:''};
  var box=document.getElementById('modalBox');
  box.innerHTML='<h3>'+(id?'編輯管理人':'新增管理人')+'</h3>'+
   '<div class="fld"><label>姓名（必填）</label><input id="mg_name" value="'+esc(m.name)+'"></div>'+
   '<div class="fld"><label>徽章字（1字，空白＝名字末字，同 G95）</label><input id="mg_badge" maxlength="1" value="'+esc(m.badge||'')+'" style="width:80px;text-align:center;font-weight:700"></div>'+
   '<div class="fld"><label>電話</label><input id="mg_phone" value="'+esc(m.phone||'')+'"></div>'+
   '<div class="fld"><label>備註</label><input id="mg_note" value="'+esc(m.note||'')+'"></div>'+
   '<div class="row"><button class="btn primary" id="saveMg">儲存</button><button class="btn" id="cancelM">取消</button></div>';
  box.querySelector('#cancelM').onclick=closeModal;
  box.querySelector('#saveMg').onclick=function(){
    var o={id:m.id||uid(),name:box.querySelector('#mg_name').value.trim(),badge:box.querySelector('#mg_badge').value.trim(),phone:box.querySelector('#mg_phone').value.trim(),note:box.querySelector('#mg_note').value.trim()};
    if(!o.name){alert('請填姓名');return;}
    if(m.id){DS.managers=DS.managers.map(function(x){return x.id===m.id?o:x;});}else{DS.managers=DS.managers||[];DS.managers.push(o);}
    save();closeModal();renderManagers();};
  openModal();
}

/* people */
var _pplEdit=false,_pplBackup=null;
function peopleSorted(list){
  return list.slice().sort(function(a,b){
    var ao=(a.ord!=null?a.ord:1e9),bo=(b.ord!=null?b.ord:1e9);
    if(ao!==bo)return ao-bo;
    var fa=a.foreman?0:1,fb=b.foreman?0:1;
    if(fa!==fb)return fa-fb;
    return String(a.name||'').localeCompare(String(b.name||''),'zh-TW');
  });
}
function _pplSections(){
  return [
    {key:'local',label:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="12" cy="8" r="4"/><path d="M8 5c0-1.5 8-1.5 8 0"/><path d="M5 21v-1a7 7 0 0 1 14 0v1"/></svg> 本地人員',hd:'background:#EAF4FC;color:#26476b',list:peopleSorted(DS.people.filter(function(p){return !p.migrant;}))},
    {key:'mig',label:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3.5 3 14 0 18M12 3c-3 3.5-3 14 0 18"/></svg> 移工',hd:'background:#fdf4ff;color:#a21caf',list:peopleSorted(DS.people.filter(function(p){return p.migrant;}))}
  ];
}
function _pplSaveOrder(secKey,newList){
  var i=0;
  _pplSections().forEach(function(s){
    var l=(s.key===secKey)?newList:s.list;
    l.forEach(function(p){p.ord=i++;});
  });
  save();renderPeople();
}
function renderPeople(){
  renderGroups();renderManagers();
  var bar=document.getElementById('pplBar');bar.innerHTML='';
  var host=document.getElementById('peopleHost');host.innerHTML='';
  if(_pplEdit){renderPeopleEdit(bar,host);return;}
  bar.innerHTML='<button class="btn primary" id="bulkEdit"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L8 20l-5 1 1-5z"/></svg> 全員編輯</button><button class="btn sm" id="expandAll">全部展開</button><button class="btn sm" id="collapseAll">全部收合</button><span class="muted" style="font-size:13.5px">桌面:拖卡片換順序/拖進小組</span>';
  bar.querySelector('#bulkEdit').onclick=function(){enterBulk(false);};
  bar.querySelector('#expandAll').onclick=function(){document.querySelectorAll('.pcard').forEach(function(c){c.classList.add('open');});};
  bar.querySelector('#collapseAll').onclick=function(){document.querySelectorAll('.pcard').forEach(function(c){c.classList.remove('open');});};
  _pplSections().forEach(function(sec){
    var hd=document.createElement('div');hd.style.cssText=sec.hd+';border-radius:0;padding:8px 12px;font-weight:700;font-size:13.5px;margin:10px 0 0';hd.textContent=sec.label+'（'+sec.list.length+'）';host.appendChild(hd);
    var grid=document.createElement('div');grid.className='grid-people';
    sec.list.forEach(function(p){grid.appendChild(personCard(p,sec));});
    if(!sec.list.length){var e=document.createElement('div');e.className='muted';e.style.cssText='font-size:12.5px;padding:8px 4px';e.textContent='（無）';grid.appendChild(e);}
    host.appendChild(grid);
  });
}
function personCard(p,sec){
  var st=safetyStatus(p.safety);var d=document.createElement('div');d.className='pcard';
  d.draggable=true;
  d.ondragstart=function(e){
    if(e.target&&e.target.closest&&e.target.closest('button,input,select,textarea,label')){e.preventDefault();return;}
    e.dataTransfer.setData('text/plain',JSON.stringify({personId:p.id}));
  };
  d.ondragover=function(e){e.preventDefault();d.classList.add('dragover');};
  d.ondragleave=function(){d.classList.remove('dragover');};
  d.ondrop=function(e){
    e.preventDefault();d.classList.remove('dragover');
    try{
      var o=JSON.parse(e.dataTransfer.getData('text/plain'));
      if(!o.personId||o.personId===p.id)return;
      var src=personById(o.personId);if(!src)return;
      if(!!src.migrant!==!!p.migrant)return; // 本勞/移工不能跨區
      var list=sec.list.filter(function(x){return x.id!==src.id;});
      var pos=list.indexOf(p);if(pos<0)pos=list.length;
      list.splice(pos,0,src);
      _pplSaveOrder(sec.key,list);
    }catch(err){}
  };
  var gb=groupsOf(p.id).map(function(gr){return '<span class="gbadge">'+esc(gr.name)+'</span>';}).join('');
  var thumb=p.photo?'<img class="thumb" src="'+p.photo+'">':'<span class="thumb">證照</span>';
  d.innerHTML='<div class="ph-head">'+thumb+'<div style="flex:1"><span class="nm">'+esc(p.name)+'</span>'+(p.foreman?'<span class="star"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 3l2.7 5.8 6.3.7-4.7 4.3 1.3 6.2-5.6-3.2-5.6 3.2 1.3-6.2L2 9.5l6.3-.7z"/></svg></span>':'')+(p.migrant?'<span class="badge">移工</span>':'')+gb+
    '<div class="muted" style="font-size:13.5px">'+esc(p.company)+' · '+esc(p.skill)+'</div>'+
    '<div style="font-size:13.5px;margin-top:3px"><span class="dot" style="background:'+safetyColor(st)+'"></span>勞安 '+(p.safety||'—')+(st==='over'?' 已過期':st==='soon'?' 即將到期':'')+'</div></div>'+
    '<button class="btn sm toggle">▾</button></div>'+
    '<div class="pexp"><div class="kv">性別：'+esc(p.gender||'—')+'　年齡：'+(ageOf(p.birth)||'—')+'（'+(p.birth||'—')+'）</div>'+
    '<div class="kv">勞保：'+(p.laborIns?'有':'無')+'　健保：'+(p.healthIns?'有':'無')+'　領班：'+(p.foreman?'是 <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 3l2.7 5.8 6.3.7-4.7 4.3 1.3 6.2-5.6-3.2-5.6 3.2 1.3-6.2L2 9.5l6.3-.7z"/></svg>':'否')+'</div>'+
    '<div class="kv">備註：'+esc(p.note||'—')+'</div>'+
    '<div class="muted" style="font-size:11.5px;margin-top:4px">修改請用上方「<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L8 20l-5 1 1-5z"/></svg> 全員編輯」</div></div>';
  d.querySelector('.toggle').onclick=function(){d.classList.toggle('open');};
  return d;
}
function enterBulk(addNew){
  _pplBackup=JSON.stringify(DS.people);
  _pplEdit=true;
  if(addNew)_pplAddBlank();
  renderPeople();
}
function _pplAddBlank(){DS.people.push({id:uid(),name:'',migrant:false,gender:'男',birth:'',company:'',skill:'',foreman:false,laborIns:false,healthIns:false,safety:'',photo:'',note:''});}
function renderPeopleEdit(bar,host){
  bar.innerHTML='<button class="btn" id="bulkOk" style="background:#16a34a;color:#fff;border-color:#16a34a"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M4 12l5 5 11-11"/></svg> 確認</button>'+
    '<button class="btn" id="bulkRevert" style="border-color:#f59e0b;color:#92400e">↩ 全部還原</button>'+
    '<button class="btn" id="bulkAdd">＋ 新增人員</button>'+
    '<span class="muted" style="font-size:13.5px">編輯中暫停雲端同步；卡上「↩」＝只還原該筆</span>';
  bar.querySelector('#bulkOk').onclick=function(){
    var bad=DS.people.filter(function(p){return !String(p.name||'').trim();}).length;
    if(bad){alert('有 '+bad+' 筆姓名空白，請補齊或刪除該卡');return;}
    (DS.groups||[]).forEach(function(gr){
      gr.memberIds=(gr.memberIds||[]).filter(function(id){return personById(id);});
      if(!personById(gr.leaderId))gr.leaderId=gr.memberIds[0]||'';
    });
    _pplEdit=false;_pplBackup=null;save();renderPeople();
  };
  bar.querySelector('#bulkRevert').onclick=function(){
    if(confirm('全部退回「進入編輯前」的狀態？（此次編輯的所有改動都會消失）')){DS.people=JSON.parse(_pplBackup);renderPeople();}
  };
  bar.querySelector('#bulkAdd').onclick=function(){_pplAddBlank();renderPeople();};
  _pplSections().forEach(function(sec){
    var hd=document.createElement('div');hd.style.cssText=sec.hd+';border-radius:0;padding:8px 12px;font-weight:700;font-size:13.5px;margin:10px 0 0';hd.textContent=sec.label+'（'+sec.list.length+'）— 編輯中';host.appendChild(hd);
    var grid=document.createElement('div');grid.className='grid-people';
    sec.list.forEach(function(p){grid.appendChild(personEditCard(p));});
    host.appendChild(grid);
  });
}
function personEditCard(p){
  var d=document.createElement('div');d.className='pcard open';
  function fld(lb,html){return '<div style="margin-bottom:6px"><div class="muted" style="font-size:12.5px">'+lb+'</div>'+html+'</div>';}
  var thumb=p.photo?'<img class="thumb" src="'+p.photo+'">':'<span class="thumb">證照</span>';
  d.innerHTML='<div class="row" style="margin-bottom:6px">'+thumb+
    '<input class="eName" placeholder="姓名(必填)" value="'+esc(p.name)+'" style="flex:1;min-width:90px;font-weight:700">'+

var _stgColl={},_stgLimit={},_stgKindColl={},_stgBldg='';

function _fmtMD2(d){return String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _stgInspDate(c){var m=/驗收\s*(\d{2}-\d{2})/.exec(String(c.note||''));if(m)return '驗收'+m[1];if(!c.due)return'';var d=new Date(c.due+'T12:00:00');d.setDate(d.getDate()+1);return '驗收≈'+_fmtMD2(d);}
function dayOf(off){return addDays(todayISO(),off);}
function dayLabel(off){var d=dayOf(off);return d.slice(5).replace('-','/')+'('+wd(d)+')';}
function dayShort(off){return dayOf(off).slice(5).replace('-','/');}
function itemsOn(day){return DS.items.filter(function(i){return i.day===day;});}
function dayHeads(day){var s={};itemsOn(day).forEach(function(it){(it.assignees||[]).forEach(function(a){s[a.personId]=1;});});return Object.keys(s).length;}
function selOffs(){var s=(DS.selDays&&DS.selDays.length?DS.selDays:[0,1]).slice();s.sort(function(a,b){return a-b;});return s;}
function dnumLabel(it){return it.dnum?(SITE+'-'+String(it.dnum).padStart(4,'0')):'';}
function hoursOf(it){if(it.slotType==='custom'){var r=slotRange(it);return Math.max(0,Math.round((r[1]-r[0])/6)/10);}return it.slot==='full'?8:4;}
function slotSortKey(it){if(it.slotType!=='custom'&&it.slot==='full')return -1;return slotRange(it)[0];}
function slotPillCls(it){if(it.slotType==='custom')return 'cus';return it.slot==='am'?'am':it.slot==='pm'?'pm':'full';}
function bySlot(a,b){var d=slotSortKey(a)-slotSortKey(b);return d||((a.dnum||0)-(b.dnum||0));}
function byDispatch(a,b){var d=slotSortKey(a)-slotSortKey(b);if(d)return d;d=unitCompare(a.unit||'',b.unit||'');if(d)return d;return (a.dnum||0)-(b.dnum||0);}

function fwdMove(ids){

function bySheet(a,b){var d=slotSortKey(a)-slotSortKey(b);if(d)return d;var pa=parseUnit(a.unit||''),pb=parseUnit(b.unit||'');if(pa.bldg!==pb.bldg){if(!pa.bldg)return 1;if(!pb.bldg)return -1;return pa.bldg<pb.bldg?-1:1;}var fa=pa.floor==null?-1:pa.floor,fb=pb.floor==null?-1:pb.floor;if(fa!==fb)return fb-fa;if(pa.num!==pb.num)return pa.num-pb.num;return (a.dnum||0)-(b.dnum||0);}

function _stampTxt(){var n=new Date();return todayISO()+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}

    var pw=land?277:190,ph=land?180:267;

      if(i>=els.length){pdf.save(fname+'.pdf');done();return;}
      html2canvas(els[i],{scale:2,backgroundColor:'#ffffff'}).then(function(c){
        if(i>0)pdf.addPage();
        pdf.setFontSize(9);pdf.setTextColor(120);
        pdf.text(stamp+'  p'+(i+1)+'/'+els.length,land?287:200,7,{align:'right'});
        var w=pw,h=c.height*w/c.width;if(h>ph){h=ph;w=c.width*h/c.height;}
        pdf.addImage(c.toDataURL('image/jpeg',0.92),'JPEG',10,10,w,h);
        i++;next();
      },function(){i++;next();});
    })();
  }else{
    var j=0;
    (function next2(){
      if(j>=els.length){done();return;}
      var idx=j;
      html2canvas(els[j],{scale:2,backgroundColor:'#ffffff'}).then(function(c){
        var ctx=c.getContext('2d');ctx.fillStyle='#64748b';ctx.font='24px sans-serif';ctx.textAlign='right';
        ctx.fillText(stamp+'  p'+(idx+1)+'/'+els.length,c.width-16,32);
        var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=fname+(els.length>1?('_p'+(idx+1)):'')+'.png';a.click();
        j++;setTimeout(next2,400);
      },function(){j++;setTimeout(next2,400);});
    })();
  }
}
function _shWrapBlock(paper,block,temps){
  var w=document.createElement('div');
  if(window._shExpScale)w.classList.add('sheetScaled');   // D0706-02：匯出跟著放大
  w.style.cssText='position:fixed;left:-10000px;top:0;width:'+paper.offsetWidth+'px;background:#fff';
  var hd=paper.firstElementChild;if(hd)w.appendChild(hd.cloneNode(true));
  var pad=document.createElement('div');pad.style.cssText='padding:12px 16px';
  pad.appendChild(block.cloneNode(true));
  w.appendChild(pad);document.body.appendChild(w);temps.push(w);
  return w;
}
function _shChunkTable(paper,tbl,per,temps){
  var thead=tbl.querySelector('thead');
  var trs=Array.prototype.slice.call(tbl.querySelectorAll('tbody tr'));
  var chunks=[];var cur=[];var n=0;
  trs.forEach(function(tr){
    var isH=tr.classList&&tr.classList.contains('bhdr');
    if(!isH)n++;
    cur.push(tr);
    if(n>=per){chunks.push(cur);cur=[];n=0;}
  });
  if(cur.length)chunks.push(cur);
  if(chunks.length<2)return [];
  var hd=paper.firstElementChild;
  return chunks.map(function(ch){
    var w=document.createElement('div');
    if(window._shExpScale)w.classList.add('sheetScaled');   // D0706-02：匯出跟著放大
    w.style.cssText='position:fixed;left:-10000px;top:0;width:'+paper.offsetWidth+'px;background:#fff';
    if(hd)w.appendChild(hd.cloneNode(true));
    var pad=document.createElement('div');pad.style.cssText='padding:12px 16px;overflow-x:auto';
    var t2=document.createElement('table');
    if(thead)t2.appendChild(thead.cloneNode(true));
    var tb=document.createElement('tbody');
    ch.forEach(function(tr){tb.appendChild(tr.cloneNode(true));});
    t2.appendChild(tb);pad.appendChild(t2);w.appendChild(pad);
    document.body.appendChild(w);temps.push(w);
    return w;
  });
}
function sheetExport(day,kind){
  var el=document.getElementById('sheetPaper');if(!el)return;
  var hide=document.querySelectorAll('.sheet-actions, .bottomnav, .appbar, .note, #bkBanner');var arr=[];
  hide.forEach(function(e){arr.push([e,e.style.display]);e.style.display='none';});
  var useScale=!_sheetExportStd;window._shExpScale=useScale;   // D0706-02：匯出是否跟著放大
  var elHadScale=el.classList.contains('sheetScaled');
  if(!useScale&&elHadScale)el.classList.remove('sheetScaled');   // 匯出標準字級：整張 fallback 也還原
  var pages=[],temps=[];
  try{
    if(_sheetMode==='person'){
      var blocks=el.querySelectorAll('[data-shblock]');
      if(blocks.length>1)pages=Array.prototype.slice.call(blocks).map(function(b){return _shWrapBlock(el,b,temps);});
    }else{
      var tbl=el.querySelector('table');
      if(tbl){var dataRows=tbl.querySelectorAll('tbody tr:not(.bhdr)');if(dataRows.length>15)pages=_shChunkTable(el,tbl,15,temps);}
    }
  }catch(e){pages=[];}
  var restore=function(){arr.forEach(function(p){p[0].style.display=p[1]||'';});temps.forEach(function(t){try{t.remove();}catch(e){}});if(!useScale&&elHadScale)el.classList.add('sheetScaled');};
  setTimeout(function(){
    if(!pages.length)pages=[el];
    _exportPages(pages,kind==='png'?'png':'pdf','派工單_'+day,true,restore);
  },30);
}
function backupNow(){
  var data=JSON.stringify(DS,null,1);

function _weekKey(){var d=new Date();var dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return todayISO(d);}
/* D0721-01：每週自動備份——本週首次開啟且有雲端寫入權時，靜默寫一份到 dispatch/{SITE}/backups/{週}；無雲端/唯讀/太大＝退回週一橫幅提醒。 */
function _autoWeeklyBackup(){
  try{
    if(DS.bkWeek===_weekKey())return;                         // 本週已備份過
    if(!_cloudOn||!_allowed||_readonly){                       // 無雲端或唯讀→退回橫幅
      if(new Date().getDay()===1){var b0=document.getElementById('bkBanner');if(b0)b0.style.display='';}
      return;
    }
    var json=JSON.stringify(DS);
    if(json.length>900000){                                   // 太大不塞單文件→退回橫幅手動下載
      var b1=document.getElementById('bkBanner');if(b1)b1.style.display='';
      return;
    }
    var wk=_weekKey();
    window._fb.setDoc(window._fb.doc(_siteDoc(),'backups',wk),{week:wk,at:Date.now(),by:(DS.user||_userEmail||''),ver:CODE_VERSION,data:json}).then(function(){
      DS.bkWeek=wk;save();
      var b=document.getElementById('bkBanner');if(b)b.style.display='none';
      console.log('[備份] 本週自動備份完成',wk,json.length+' bytes');
    }).catch(function(e){
      console.warn('[備份] 自動備份失敗，退回手動',e);
      if(new Date().getDay()===1){var b2=document.getElementById('bkBanner');if(b2)b2.style.display='';}
    });
  }catch(e){console.warn('autoBackup',e);}
}
/* D0721-01：開機健檢——掃各集合同內容多份（疑似資料翻倍/重複匯入），只警示不改資料。 */
function _dispHealthCheck(){
  try{
    var dup=0;
    ['people','machines','managers','groups','items'].forEach(function(type){
      var seen={},arr=DS[type]||[];
      arr.forEach(function(o){
        if(!o)return;
        var c=Object.assign({},o);delete c.id;delete c._mt;delete c._del;
        var k=type+'|'+JSON.stringify(c);
        if(seen[k])dup++;else seen[k]=1;
      });
    });
    if(dup>3){
      var t=document.getElementById('dispHealthTxt');if(t)t.textContent='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M12 3 2 20h20Z"/><path d="M12 9v5M12 17h.01"/></svg> 健檢：偵測到 '+dup+' 筆疑似重複資料（同內容多份），建議先備份再檢查。';
      var b=document.getElementById('dispHealth');if(b)b.style.display='';
      console.warn('[健檢] 疑似重複',dup);
    }else{console.log('[健檢] 資料正常（疑似重複',dup,'筆）');}
  }catch(e){console.warn('health',e);}
}

function migrate(){
  if(!DS.selDays||!DS.selDays.length)DS.selDays=[0,1];
  if(!DS.viewMode)DS.viewMode='work';
  if(!DS.candDays)DS.candDays=3;
  if(!DS.layout)DS.layout='row';
  if(!DS.groups)DS.groups=seed().groups;
  if(!DS.machineFields)DS.machineFields=[];
  if(!DS.managers)DS.managers=seed().managers;
  (DS.machines||[]).forEach(function(m){if(m.keeper===undefined)m.keeper='';if(m.loc===undefined)m.loc='';if(m.needCert===undefined)m.needCert=/需證照/.test(m.note||'');if(!m.custom)m.custom={};});
  var cutoff=addDays(todayISO(),-10);
  DS.items=(DS.items||[]).filter(function(it){return !it.day||it.day>=cutoff;});
  DS.items=DS.items.filter(function(it){return it.id!=='demo1';}); // V1.1:移除內建示範卡
  if(DS.vendors&&DS.vendors.length&&typeof DS.vendors[0]==='object'){DS.vendors=DS.vendors.map(function(v){return (v.code||'')+(v.name||'')+'('+(v.type||'')+')';});}
  if(!DS.candidates||!DS.candidates.length||!DS.candidates[0].round){DS.candidates=seed().candidates;}
  if(!DS.serial){DS.serial=1;var seen={};(DS.items||[]).forEach(function(it){if(it.dnum){if(it.dnum>=DS.serial)DS.serial=it.dnum+1;return;}if(it.crossId&&seen[it.crossId]){it.dnum=seen[it.crossId];return;}it.dnum=DS.serial++;if(it.crossId)seen[it.crossId]=it.dnum;});}
  delete DS.boardDay;delete DS.baseDate;
}
