<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>點工派遣</title>
<meta name="theme-color" content="#1e3a8a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="點工派遣">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--blue:#2563eb;--blueL:#dbeafe;--purple:#7c3aed;--purpleL:#ede9fe;--ok:#16a34a;--warn:#f59e0b;--red:#ef4444;--ink:#1f2937;--mut:#6b7280;--line:#e5e7eb;--bg:#f3f4f6;--nav:62px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px));}
/* app bar */
.appbar{background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;position:sticky;top:0;z-index:30;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;}
.appbar .t{font-size:19px;font-weight:800;text-align:center;}
.appbar .sub{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:13px;opacity:.95;}
.appbar .sub button{background:rgba(255,255,255,.18);border:0;color:#fff;border-radius:8px;padding:5px 12px;font-size:13px;}
/* bottom nav */
.bottomnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;border-top:1px solid var(--line);display:flex;z-index:40;box-shadow:0 -2px 10px rgba(0,0,0,.05);}
.navitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;color:#94a3b8;cursor:pointer;}
.navitem.on{color:var(--blue);}
.navitem svg{width:24px;height:24px;}
.wrap{padding:12px;max-width:1320px;margin:0 auto;}
button{font-family:inherit;cursor:pointer;}
.btn{border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:8px 14px;font-size:14px;color:#374151;min-height:36px;}
.btn:active{background:#f1f5f9;}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.green{background:#f0fdf4;color:#15803d;border-color:#86efac;}
.btn.sm{padding:6px 11px;font-size:13px;min-height:34px;}
.btn.danger{color:#b91c1c;border-color:#fca5a5;background:#fff5f5;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.spacer{flex:1;}
.muted{color:var(--mut);}
input,select,textarea{font-family:inherit;font-size:16px;padding:9px 10px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;}
input[type=checkbox]{width:20px;height:20px;}
.seg{display:inline-flex;background:#f1f5f9;border-radius:18px;padding:3px;}
.seg button{border:0;background:transparent;padding:6px 14px;border-radius:15px;font-weight:600;color:#94a3b8;min-height:30px;font-size:13px;}
.seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 2px rgba(0,0,0,.1);}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.note{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 11px;font-size:13px;color:#78350f;margin-bottom:10px;}
/* people */
.grid-people{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.pcard .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#eef2f6;border:1px dashed #cbd5e1;display:inline-flex;align-items:center;justify-content:center;color:#9ca3af;font-size:11px;}
.pcard .ph-head{display:flex;gap:10px;align-items:flex-start;}
.pcard .nm{font-weight:700;font-size:16px;}
.badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:9px;background:#e0f2fe;color:#0369a1;margin-left:4px;}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;margin-right:5px;}
.star{color:var(--warn);}
.pexp{margin-top:9px;border-top:1px solid var(--line);padding-top:9px;font-size:14px;display:none;}
.pcard.open .pexp{display:block;}
.kv{margin:4px 0;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:4px 11px;border-radius:12px;background:#e2e8f0;color:#334155;margin:3px 4px 3px 0;}
.chip.lead{background:#fef3c7;color:#92400e;}
.chip.mac{background:#ecfeff;color:#155e75;}
.chip.over{background:#fee2e2;color:#b91c1c;}
table{border-collapse:collapse;width:100%;background:#fff;border-radius:10px;overflow:hidden;}
th,td{border:1px solid var(--line);padding:8px;text-align:left;font-size:14px;}
th{background:#e2e8f0;}
/* board */
.staging{background:#fff;border:1px solid #e2e8f0;border-left:5px solid #f59e0b;border-radius:14px;padding:11px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.stg-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.stg{min-width:250px;max-width:250px;background:#fff;border:1px solid #e2e8f0;border-left:4px solid #ef4444;border-radius:12px;padding:10px;font-size:13px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.stg.soon{border-left-color:#f59e0b;}
.rchip{border:0;font-size:12.5px;font-weight:700;padding:5px 13px;border-radius:13px;cursor:pointer;}
.rchip.ri{background:#dbeafe;color:#1e40af;}
.rchip.rr{background:#ede9fe;color:#5b21b6;}
.rchip.off{opacity:.35;}
.board{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:820px){.board{grid-template-columns:1fr !important;}}
.col h2{font-size:15px;margin:0 0 10px;padding:11px 14px;border-radius:12px;color:#fff;display:flex;align-items:center;gap:8px;font-weight:700;}
.col h2 .cnt{margin-left:auto;font-size:12.5px;font-weight:400;opacity:.85;}
.col.d0 h2{background:#2563eb;}
.col.d1 h2{background:#7c3aed;}
.col.d2 h2{background:#0d9488;}
.wcard{background:#fbfcfe;border:1px solid #e2e8f0;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.wcard.bad{background:#fff;border-color:#fca5a5;}
.seq.warn{background:var(--red);}
.wcard .wh{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.seq{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.mgr{width:26px;height:26px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}
.slot{font-size:12px;padding:3px 10px;border-radius:12px;background:#fde68a;color:#92400e;}
.cross{font-size:12px;padding:3px 10px;border-radius:12px;background:#ddd6fe;color:#5b21b6;}
.idtag{color:#9ca3af;font-size:13px;margin-left:auto;}
.drop.dragover{outline:2px dashed var(--blue);background:#f0f7ff;}
.warn-txt{color:#dc2626;font-weight:700;font-size:13px;}
.ok-txt{color:var(--ok);font-weight:700;font-size:13px;}
.people-strip{display:flex;gap:7px;flex-wrap:wrap;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:9px;margin-bottom:10px;}
.pchip{background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:7px 12px;font-size:13px;cursor:grab;}
/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.mask.on{display:flex;}
.modal{background:#fff;border-radius:18px 18px 0 0;max-width:600px;width:100%;max-height:92vh;overflow:auto;padding:18px 16px calc(20px + env(safe-area-inset-bottom,0px));}
@media(min-width:700px){.mask{align-items:center;}.modal{border-radius:16px;}}
.modal h3{margin:0 0 12px;}
.fld{margin-bottom:11px;display:flex;flex-direction:column;gap:5px;}
.fld label{font-size:13px;color:#374151;font-weight:600;}
.fld input,.fld select,.fld textarea{width:100%;}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pick-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;}
/* V0.3 */
.pill{border:1px solid #cbd5e1;background:#fff;border-radius:17px;padding:7px 13px;font-size:13.5px;color:#64748b;font-weight:600;min-height:34px;}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.dnum{font-size:12px;padding:2px 8px;border-radius:6px;background:#f1f5f9;border:1px solid #cbd5e1;color:#334155;font-weight:600;white-space:nowrap;}
.samebadge{font-size:11px;padding:2px 8px;border-radius:10px;background:#fce7f3;color:#9d174d;white-space:nowrap;}
.srcbadge{font-size:11px;padding:3px 8px;border-radius:10px;cursor:pointer;border:0;white-space:nowrap;}
.srcbadge.chg{background:#fef3c7;color:#92400e;}
.srcbadge.done{background:#dcfce7;color:#166534;}
.prow{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:10px;display:flex;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.prow .pinfo{width:160px;flex:none;display:flex;gap:9px;align-items:flex-start;}
.prow .pitems{flex:1;min-width:0;}
.pitem{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;cursor:pointer;}
.slotpill{font-size:12px;padding:2px 9px;border-radius:11px;flex:none;white-space:nowrap;}
.slotpill.am{background:#dcfce7;color:#166534;}.slotpill.pm{background:#fee2e2;color:#991b1b;}.slotpill.full{background:#dbeafe;color:#1e40af;}.slotpill.cus{background:#e0e7ff;color:#3730a3;}
.avat{width:42px;height:42px;border-radius:50%;background:#dbeafe;color:#1d4ed8;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex:none;}
.unassigned{background:#fff7ed;border:1px solid #fdba74;border-radius:14px;padding:11px;margin-bottom:10px;}
.dayhdr{font-size:15px;margin:0 0 10px;padding:11px 14px;border-radius:12px;background:#2563eb;color:#fff;font-weight:700;display:flex;align-items:center;gap:8px;}
.dayhdr.d1{background:#7c3aed;}
.dayhdr.d2{background:#0d9488;}
.dayhdr .btn{background:rgba(255,255,255,.18);color:#fff;border:0;}
.dayhdr .spacer{flex:1;}
.stg-sec{margin-top:6px;}
.stg-sec .sechdr{font-weight:700;font-size:13px;cursor:pointer;padding:5px 0;user-select:none;}
@media(max-width:560px){.prow{flex-direction:column;gap:8px}.prow .pinfo{width:auto;}}
/* V0.5 groups */
.groups{background:#fff;border:1px solid #e2e8f0;border-left:5px solid #7c3aed;border-radius:14px;padding:11px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.gwrap{display:flex;gap:10px;flex-wrap:wrap;margin-top:9px;}
.gcard{background:#faf5ff;border:1px solid #ddd6fe;border-radius:12px;padding:10px;min-width:210px;max-width:280px;}
.gcard .gname{font-weight:700;color:#5b21b6;font-size:14.5px;}
.gdrop{border:2px dashed #94a3b8;border-radius:12px;min-width:190px;display:flex;align-items:center;justify-content:center;text-align:center;color:#64748b;font-size:12.5px;padding:10px;background:#f8fafc;}
.gdrop.dragover,.gcard.dragover{outline:2px dashed var(--purple);background:#f5f3ff;}
.gchip{background:#ede9fe;border:1px solid #c4b5fd;color:#5b21b6;border-radius:10px;padding:7px 12px;font-size:13px;cursor:grab;font-weight:700;}
.gbadge{display:inline-block;font-size:10.5px;padding:1px 6px;border-radius:8px;background:#ede9fe;color:#5b21b6;margin-left:4px;vertical-align:middle;}
.gapply{background:#ede9fe;border:0;color:#5b21b6;font-weight:700;border-radius:15px;padding:7px 13px;font-size:13px;cursor:pointer;}
#loginMask{background:#1e293b;align-items:center;}
#loginMask .modal{max-width:360px;text-align:center;border-radius:16px;margin:14px;}
</style>
</head>
<body>
<div class="appbar">
  <div class="t" id="appTitle">點工派遣</div>
  <div class="sub"><span id="who"></span><span id="syncTag" style="font-size:12px"></span><button id="logoutBtn" style="display:none">登出</button><span id="verTag">V1.1</span></div>
</div>

<div class="wrap">
  <div class="note" id="cloudNote">雲端版：資料即時同步（人員/機具/小組/管理人＝公司層全工地共用；派工單＝本工地）。真實帶入 G95 候選待 B 階段。</div>
  <div id="roBanner" style="display:none;background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:9px 12px;font-size:13px;color:#991b1b;margin-bottom:10px"></div>
  <div id="bkBanner" style="display:none;background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:9px 12px;font-size:13px;color:#92400e;margin-bottom:10px">
    📦 週一提醒：請備份上週資料（工單只保留近 10 天）
    <button class="btn sm" id="bkNow" style="margin-left:8px;background:#f59e0b;color:#fff;border-color:#f59e0b">一鍵備份</button>
    <button class="btn sm" id="bkLater" style="margin-left:4px">稍後</button>
  </div>

  <!-- BOARD -->
  <section id="pane-board">
    <div id="ctrlRows">
    <div class="row" style="margin-bottom:10px;row-gap:8px">
      <span id="dayPills" class="row" style="gap:6px;flex-wrap:nowrap"></span>
      <div class="seg" id="vmSeg"><button data-vm="work" class="on">依工作</button><button data-vm="person">依人員</button></div>
      <div class="seg" id="viewSeg"><button data-v="card" class="on">卡片</button><button data-v="list">條列</button></div>
      <button class="btn sm" id="layoutBtn" title="兩天欄排列方式">⬌ 並排</button>
      <button class="btn sm" id="grpBtn" title="管理常用小組">👥 小組</button>
      <span class="spacer"></span>
      <button class="btn sm" id="exportPdf">PDF</button>
      <select id="capScope" class="btn sm"></select>
      <button class="btn sm" id="capBtn">截圖</button>
    </div>
    </div>

    <div class="staging" id="staging">
      <div class="row">
        <b id="stgTitle">待帶入工作</b>
        <select id="stgDays" class="btn sm"><option value="3">逾期＋3天內</option><option value="5">逾期＋5天內</option><option value="7">逾期＋7天內</option></select>
        <button class="btn sm" id="stgToggle" style="margin-left:auto">收合</button>
      </div>
      <div class="row" style="margin-top:8px">
        <input id="stgSearch" placeholder="搜尋戶別/廠商/#號…" style="flex:1;min-width:120px">
        <select id="stgSort"><option value="overdue">逾期優先</option><option value="due">到期日</option><option value="unit">戶別</option><option value="vendor">廠商</option></select>
      </div>
      <div style="color:#dc2626;font-weight:700;font-size:12px;margin-top:6px">※ 此區不列印 / 不截圖 · 供判斷是否帶入</div>
      <div id="stgBody" style="margin-top:4px"></div>
    </div>

    <div id="capArea"></div>
  </section>

  <!-- SHEET -->
  <section id="pane-sheet" style="display:none"><div id="sheetHost"></div></section>

  <!-- PEOPLE -->
  <section id="pane-people" style="display:none">
    <div class="groups" id="groupsBox"></div>
    <div class="row"><button class="btn primary" id="addPerson">＋ 新增人員</button>
      <button class="btn sm" id="expandAll">全部展開</button><button class="btn sm" id="collapseAll">全部收合</button></div>
    <div class="muted" style="font-size:12px;margin-top:6px">綠/黃/紅＝勞安六小時：正常 / 剩30天 / 過期</div>
    <div class="grid-people" id="peopleGrid"></div>
    <div class="groups" id="mgrBox" style="border-left-color:#0891b2;margin-top:14px"></div>
  </section>

  <!-- MACHINE -->
  <section id="pane-machine" style="display:none">
    <div class="row"><button class="btn primary" id="addMachine">＋ 新增機具</button><span class="muted" id="machSummary" style="font-size:13px"></span></div>
    <div class="muted" style="font-size:12px;margin:6px 0">卡片顯示「已派/剩餘」＝依派遣單日期膠囊選到的日子即時計算；數量 −/＋ 可直調</div>
    <div class="grid-people" id="machineGrid" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))"></div>
  </section>
</div>

<nav class="bottomnav">
  <div class="navitem on" data-tab="board"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M9 4v16"/></svg>分配區</div>
  <div class="navitem" data-tab="sheet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>工單</div>
  <div class="navitem" data-tab="people"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><circle cx="17" cy="9" r="2.2"/><path d="M16 15c3 0 5 2 5 5"/></svg>人員</div>
  <div class="navitem" data-tab="machine"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 7a3 3 0 1 0-4 4l-6 6 2 2 6-6a3 3 0 0 0 4-4l-2 2-2-2 2-2z"/></svg>機具</div>
</nav>

<div class="mask" id="modalMask"><div class="modal" id="modalBox"></div></div>

  <img src="icon-192.png" alt="" style="width:64px;height:64px;border-radius:14px;margin-bottom:8px">

  <button class="btn" id="loginLocalBtn" style="width:100%;margin-top:8px;display:none">離線試用（僅存這台裝置）</button>
</div></div>

/* ── 雲端同步引擎(V1.0):per-doc、_mt 新的贏、10分近期編輯保護盾、_del 墓碑 ── */
var SYNC_TYPES=['people','machines','groups','managers','items'];
var _lastSync={},_touch={};
function _siteDoc(){return window._fb.doc(window._fb.db,'dispatch',SITE);}
function _companyDoc(){return window._fb.doc(window._fb.db,'dispatch','company');}
function _colRef(type){return type==='items'?window._fb.collection(_siteDoc(),'items'):window._fb.collection(_companyDoc(),type);}
function _setSync(txt,ok){var el=document.getElementById('syncTag');if(el){el.textContent=txt;el.style.color=ok?'#bbf7d0':'#fecaca';}}
function _flush(){
  if(!_cloudOn||_readonly)return;
  var wrote=0;
  SYNC_TYPES.forEach(function(type){
    var arr=DS[type]||[];var last=_lastSync[type]=_lastSync[type]||{};var cur={};
    arr.forEach(function(o){if(o&&o.id)cur[o.id]=o;});
    Object.keys(cur).forEach(function(id){
      var j=JSON.stringify(cur[id]);
      if(last[id]===j)return;
      var data=JSON.parse(j);data._mt=Date.now();delete data._del;
      window._fb.setDoc(window._fb.doc(_colRef(type),id),data).catch(function(e){console.warn('flush',type,id,e);_setSync('⚠ 寫入失敗',false);});
      last[id]=j;_touch[type+'/'+id]=Date.now();wrote++;
    });
    Object.keys(last).forEach(function(id){
      if(cur[id])return;
      window._fb.setDoc(window._fb.doc(_colRef(type),id),{_del:true,_mt:Date.now()}).catch(function(e){console.warn(e);});
      delete last[id];_touch[type+'/'+id]=Date.now();wrote++;
    });
  });
  var mf=JSON.stringify(DS.machineFields||[]);
  if(_lastSync._mf!==mf){window._fb.setDoc(_companyDoc(),{machineFields:DS.machineFields||[],_mt:Date.now()},{merge:true}).catch(function(e){console.warn(e);});_lastSync._mf=mf;wrote++;}
  if(wrote)_setSync('✓ 已同步',true);
}
function _applyRemoteType(type,snap){
  var changed=false;
  var last=_lastSync[type]=_lastSync[type]||{};
  var arr=DS[type]||[];
  snap.forEach(function(ds){
    var id=ds.id,d=ds.data();
    var shield=(_touch[type+'/'+id]||0)>Date.now()-600000;
    var idx=-1;for(var i=0;i<arr.length;i++)if(arr[i].id===id){idx=i;break;}
    if(d._del){
      if(idx>=0&&!shield){arr.splice(idx,1);delete last[id];changed=true;}
      return;
    }
    var localMt=idx>=0?(arr[idx]._mt||0):0;
    if(shield&&idx>=0)return;
    if((d._mt||0)>=localMt){
      var j=JSON.stringify(d);
      if(idx>=0){if(last[id]===j)return;arr[idx]=d;}else{arr.push(d);}
      last[id]=j;changed=true;
    }
  });
  if(changed){
    DS[type]=arr;
    try{localStorage.setItem(LS_KEY,JSON.stringify(DS));}catch(e){}
    _rerender();
  }
}
function _rerender(){
  var panes={'pane-board':renderBoard,'pane-sheet':renderSheet,'pane-people':renderPeople,'pane-machine':renderMachine};
  Object.keys(panes).forEach(function(id){var el=document.getElementById(id);if(el&&el.style.display!=='none')panes[id]();});
}
function _markAllSynced(){
  SYNC_TYPES.forEach(function(type){var last=_lastSync[type]={};(DS[type]||[]).forEach(function(o){if(o&&o.id)last[o.id]=JSON.stringify(o);});});

}
function _cloudBoot(){
  if(_cloudOn)return;_cloudOn=true;
  window._fb.getDocs(_colRef('people')).then(function(snap){
    if(snap.empty&&(DS.people||[]).length&&_allowed&&!window._PREVIEW){
      if(confirm('雲端尚無資料。要把這台裝置的本機資料（人員/機具/小組/管理人/派工單）上傳作為起始資料嗎？\n按取消＝從空白雲端開始。')){
        _lastSync={};_flush();
      }else{DS.people=[];DS.machines=[];DS.groups=[];DS.managers=[];DS.items=[];DS.machineFields=[];save();_rerender();}
    }else{_markAllSynced();}
    SYNC_TYPES.forEach(function(type){
      window._fb.onSnapshot(_colRef(type),function(s){_applyRemoteType(type,s);},function(e){console.warn('snap',type,e);_setSync('⚠ 連線異常',false);});
    });
    window._fb.onSnapshot(_siteDoc(),function(ds){
      var d=ds.exists()?ds.data():{};
      if((d.serial||0)>(DS.serial||1))DS.serial=d.serial;
      if(!window._PREVIEW&&(d.codeVersion||0)>CODE_VERSION){
        _readonly=true;
        var b=document.getElementById('roBanner');b.style.display='';
        b.textContent='⚠ 雲端已有更新版本（v'+d.codeVersion+' > v'+CODE_VERSION+'），此頁轉唯讀。請重新整理或更新 App。';
      }
    });
    window._fb.onSnapshot(_companyDoc(),function(ds){
      var d=ds.exists()?ds.data():{};
      if(d.machineFields){var j=JSON.stringify(d.machineFields);if(j!==JSON.stringify(DS.machineFields||[])){DS.machineFields=d.machineFields;_lastSync._mf=j;_rerender();}}
    });
    if(!window._PREVIEW&&_allowed){window._fb.setDoc(_siteDoc(),{codeVersion:CODE_VERSION},{merge:true}).catch(function(){});}
    _g95Subscribe();
    _setSync('✓ 已同步',true);
  }).catch(function(e){
    console.warn('cloudBoot',e);_setSync('⚠ 讀取失敗(規則發布了嗎?)',false);
  });
}
/* ── V1.1:唯讀訂閱 G95 真實資料(rows/meta) ── */
function _g95Subscribe(){
  var rowsRef=window._fb.doc(window._fb.db,'projects','main','_fields','rows');
  window._fb.onSnapshot(rowsRef,function(ds){
    try{var d=ds.exists()?ds.data():null;window._g95Rows=(d&&d.d)?JSON.parse(d.d):[];}
    catch(e){console.warn('g95 rows parse',e);window._g95Rows=[];}
    _rerender();
  },function(e){console.warn('g95 rows snap',e);});
  var metaRef=window._fb.doc(window._fb.db,'projects','main','_fields','meta');
  window._fb.onSnapshot(metaRef,function(ds){
    var m=null;
    try{var d=ds.exists()?ds.data():null;m=(d&&d.d)?JSON.parse(d.d):null;}catch(e){console.warn('g95 meta parse',e);}
    if(!m)return;
    var dirty=false;
    if(Array.isArray(m.vendors)&&m.vendors.length){
      var j=JSON.stringify(m.vendors);
      if(j!==JSON.stringify(DS.vendors||[])){DS.vendors=m.vendors.slice();dirty=true;}
    }
    if(Array.isArray(m.managers)){
      DS.managers=DS.managers||[];
      m.managers.forEach(function(name){
        if(!name)return;
        if(!DS.managers.some(function(x){return x.name===name;})){DS.managers.push({id:'g95_'+name,name:String(name),phone:'',note:'（G95 同步）'});dirty=true;}
      });
    }
    if(dirty){save();_rerender();}
  },function(e){console.warn('g95 meta snap',e);});
}
function _g95RowBy(refId){
  var rows=window._g95Rows;if(!rows)return null;
  for(var i=0;i<rows.length;i++)if(String(rows[i].id)===String(refId))return rows[i];
  return null;
}
function _g95RowContent(r){return (r.issue||'')+(r.note?'（'+r.note+'）':'');}
function _g95RowUnit(r){return String(r.unit||'')+(r.floor?' · '+r.floor:'');}
function _g95Cands(){
  var rows=window._g95Rows;
  if(!rows||!rows.length)return null;
  var out=[];
  rows.forEach(function(r){
    if(r.actualDone)return;
    var v=String(r.vendor||'');
    if(v.indexOf('點工')<0)return;
    if(!r.planDone)return;
    out.push({refId:String(r.id),round:(r.round==='複驗'?'複驗':'初驗'),unit:_g95RowUnit(r),content:r.issue||'',note:r.note||'',vendor:v,mgr:r.manager||'',due:r.planDone});
  });
  return out;
}
function srcStatus(it){
  if(!it.refId)return{done:false,chg:false};
  var r=_g95RowBy(it.refId);
  if(!r)return{done:!!it.srcDone,chg:!!it.srcChanged};
  if(r.actualDone)return{done:true,chg:false};
  var s=it.src||{};
  var c=_g95RowContent(r),u=_g95RowUnit(r),v=String(r.vendor||'');
  return{done:false,chg:(s.content||'')!==c||(s.unit||'')!==u||(s.vendor||'')!==v,content:c,unit:u,vendor:v};
}
function allocSerial(cb){
  if(!_cloudOn||_readonly){var n=DS.serial||1;DS.serial=n+1;cb(n);return;}
  window._fb.runTransaction(window._fb.db,function(tx){
    return tx.get(_siteDoc()).then(function(s){
      var cur=Math.max((s.exists()&&s.data().serial)||1,DS.serial||1);
      tx.set(_siteDoc(),{serial:cur+1},{merge:true});
      return cur;
    });
  }).then(function(n){DS.serial=n+1;cb(n);}).catch(function(e){
    console.warn('serial tx',e);var n=DS.serial||1;DS.serial=n+1;cb(n);
  });
}

function ageOf(birth){if(!birth)return'';var b=parseISO(birth),n=new Date();var a=n.getFullYear()-b.getFullYear();var m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;return a;}
function safetyStatus(s){if(!s)return'';var diff=(parseISO(s)-new Date())/86400000;if(diff<0)return'over';if(diff<=30)return'soon';return'ok';}
function safetyColor(st){return st==='over'?'var(--red)':st==='soon'?'var(--warn)':st==='ok'?'var(--ok)':'#cbd5e1';}
function personById(id){return DS.people.filter(function(p){return p.id===id;})[0];}
function groupById(id){return (DS.groups||[]).filter(function(g){return g.id===id;})[0];}
function groupsOf(pid){return (DS.groups||[]).filter(function(g){return (g.memberIds||[]).indexOf(pid)>=0;});}
function machineById(id){return DS.machines.filter(function(m){return m.id===id;})[0];}
function mgrCode(name){return name?name.slice(-1):'?';}
function mgrColor(name){var pal=['#16a34a','#7c3aed','#0891b2','#db2777','#ea580c','#0d9488'];var s=0;for(var i=0;i<(name||'').length;i++)s+=name.charCodeAt(i);return pal[s%pal.length];}
function slotRange(it){if(it.slotType==='custom'&&it.start&&it.end){var a=it.start.split(':'),b=it.end.split(':');return[(+a[0])*60+(+a[1]),(+b[0])*60+(+b[1])];}if(it.slot==='am')return[480,720];if(it.slot==='pm')return[780,1020];return[480,1020];}
function overlap(a,b){var ra=slotRange(a),rb=slotRange(b);return ra[0]<rb[1]&&rb[0]<ra[1];}
function slotLabel(it){if(it.slotType==='custom')return (it.start||'')+'–'+(it.end||'');return it.slot==='am'?'上午':it.slot==='pm'?'下午':'全天';}
function parseUnit(s){s=String(s||'');var fm=s.match(/(\d+)\s*[Ff]/);var floor=fm?+fm[1]:null;var bm=s.match(/([A-Za-z]+)\s*(\d+)/);var bldg=bm?bm[1].toUpperCase():'';var num=bm?+bm[2]:0;return{floor:floor,bldg:bldg,num:num};}
function unitCompare(a,b){var pa=parseUnit(a),pb=parseUnit(b);var fa=pa.floor==null?-Infinity:pa.floor,fb=pb.floor==null?-Infinity:pb.floor;if(fa!==fb)return fb-fa;if(pa.bldg!==pb.bldg)return pa.bldg<pb.bldg?-1:1;return pa.num-pb.num;}
function conflictsFor(day){
  var items=DS.items.filter(function(it){return it.day===day;});var pConf={},mOver={};
  for(var i=0;i<items.length;i++)for(var j=i+1;j<items.length;j++){if(!overlap(items[i],items[j]))continue;
    (items[i].assignees||[]).forEach(function(a){if((items[j].assignees||[]).some(function(b){return b.personId===a.personId;})){pConf[items[i].id+'|'+a.personId]=1;pConf[items[j].id+'|'+a.personId]=1;}});}
  DS.machines.forEach(function(m){items.forEach(function(it){var here=(it.machines||[]).filter(function(x){return x.machineId===m.id;})[0];if(!here)return;var sum=0;items.forEach(function(o){if(overlap(it,o)){var h=(o.machines||[]).filter(function(x){return x.machineId===m.id;})[0];if(h)sum+=(+h.qty||0);}});if(sum>m.qty)mOver[it.id+'|'+m.id]=1;});});
  return {p:pConf,m:mOver};
}

/* machine */
function machUsedOn(day,mid){var sum=0;itemsOn(day).forEach(function(it){(it.machines||[]).forEach(function(x){if(x.machineId===mid)sum+=(+x.qty||0);});});return sum;}
function machMaxUsed(mid){var days={},max=0;DS.items.forEach(function(it){days[it.day]=1;});Object.keys(days).forEach(function(d){var u=machUsedOn(d,mid);if(u>max)max=u;});return max;}
function renderMachine(){
  var g=document.getElementById('machineGrid');g.innerHTML='';
  var total=0;DS.machines.forEach(function(m){total+=(+m.qty||0);});
  document.getElementById('machSummary').textContent='共 '+DS.machines.length+' 種 · '+total+' 台';
  DS.machines.forEach(function(m){g.appendChild(machineCard(m));});
}
function machineCard(m){
  var d=document.createElement('div');d.className='pcard';
  var over=false;
  var bars=selOffs().map(function(off){
    var day=dayOf(off);var used=machUsedOn(day,m.id);var left=m.qty-used;var isOver=left<0;if(isOver)over=true;
    var pct=m.qty>0?Math.min(100,Math.round(used/m.qty*100)):0;
    var txt=used===0?dayLabel(off)+' 未派出 · 剩 '+m.qty+' 台':isOver?dayLabel(off)+' 已派 '+used+' 台 · 超派 '+(-left)+' 台 ⚠':dayLabel(off)+' 已派 '+used+' 台 · 剩 '+left+' 台';
    var col=isOver?'#ef4444':'#2563eb';
    return '<div style="font-size:12.5px;margin-top:6px;color:'+(isOver?'#dc2626;font-weight:700':used===0?'#16a34a':'#475569')+'">'+txt+'</div>'+
      '<div style="height:9px;border-radius:5px;background:'+(isOver?'#fee2e2':'#e2e8f0')+';margin-top:3px"><div style="height:9px;border-radius:5px;width:'+pct+'%;background:'+col+'"></div></div>';
  }).join('');
  var info='';
  if(m.keeper)info+='<div class="kv" style="font-size:12.5px">保管人：'+esc(m.keeper)+'</div>';
  if(m.loc)info+='<div class="kv" style="font-size:12.5px">位置：'+esc(m.loc)+'</div>';
  (DS.machineFields||[]).forEach(function(f){var v=(m.custom||{})[f.key];if(v)info+='<div class="kv" style="font-size:12.5px">'+esc(f.label)+'：'+esc(v)+'</div>';});
  if(m.note)info+='<div class="kv muted" style="font-size:12.5px">備註：'+esc(m.note)+'</div>';
  if(over)d.style.borderColor='#fca5a5';
  d.innerHTML='<div class="row"><span class="nm">'+esc(m.name)+'</span><span class="dnum">'+esc(m.serial)+'</span>'+(m.needCert?'<span class="badge" style="background:#fef3c7;color:#92400e">需證照</span>':'')+'<span class="spacer"></span><span class="badge">共 '+m.qty+' 台</span></div>'+
    bars+'<div style="margin-top:7px">'+info+'</div>'+
    '<div class="row" style="margin-top:9px"><button class="btn sm mMinus">−</button><b style="min-width:26px;text-align:center">'+m.qty+'</b><button class="btn sm mPlus">＋</button><span class="spacer"></span><button class="btn sm mDet">明細 ▾</button><button class="btn sm editM">編輯</button><button class="btn sm danger delM">刪</button></div>'+
    '<div class="mdet" style="display:none;margin-top:8px;border-top:1px solid var(--line);padding-top:8px"></div>';
  d.querySelector('.mPlus').onclick=function(){m.qty=(+m.qty||0)+1;save();renderMachine();};
  d.querySelector('.mMinus').onclick=function(){
    var nq=(+m.qty||0)-1;if(nq<1){alert('數量至少 1 台');return;}
    var mx=machMaxUsed(m.id);
    if(nq<mx&&!confirm('已有單日派出 '+mx+' 台，降到 '+nq+' 台會變超派。確定？'))return;
    m.qty=nq;save();renderMachine();};
  d.querySelector('.editM').onclick=function(){editMachine(m.id);};
  d.querySelector('.delM').onclick=function(){if(confirm('刪除 '+m.name+'？')){DS.machines=DS.machines.filter(function(x){return x.id!==m.id;});save();renderMachine();}};
  d.querySelector('.mDet').onclick=function(){
    var box=d.querySelector('.mdet');var on=box.style.display==='none';
    this.textContent=on?'明細 ▴':'明細 ▾';
    if(on){
      var html='';
      selOffs().forEach(function(off){var day=dayOf(off);
        var rows=[];itemsOn(day).forEach(function(it){(it.machines||[]).forEach(function(x){if(x.machineId===m.id)rows.push('<div style="font-size:12.5px;padding:2px 0"><span class="dnum">'+dnumLabel(it)+'</span> '+esc(slotLabel(it))+' '+esc(it.unit||'')+' ×'+x.qty+'</div>');});});
        html+='<div style="font-size:12.5px;font-weight:700;margin-top:4px">'+dayLabel(off)+'</div>'+(rows.join('')||'<div class="muted" style="font-size:12px">（未派出）</div>');
      });
      box.innerHTML=html;
    }
    box.style.display=on?'':'none';};
  return d;
}

/* board */
var _stgColl={},_stgLimit={};
function dayOf(off){return addDays(todayISO(),off);}
function dayLabel(off){var d=dayOf(off);return d.slice(5).replace('-','/')+'('+wd(d)+')';}
function dayShort(off){return dayOf(off).slice(5).replace('-','/');}
function itemsOn(day){return DS.items.filter(function(i){return i.day===day;});}
function selOffs(){var s=(DS.selDays&&DS.selDays.length?DS.selDays:[0,1]).slice();s.sort(function(a,b){return a-b;});return s;}
function dnumLabel(it){return it.dnum?(SITE+'-'+String(it.dnum).padStart(4,'0')):'';}
function hoursOf(it){if(it.slotType==='custom'){var r=slotRange(it);return Math.max(0,Math.round((r[1]-r[0])/6)/10);}return it.slot==='full'?8:4;}
function slotSortKey(it){if(it.slotType!=='custom'&&it.slot==='full')return -1;return slotRange(it)[0];}
function slotPillCls(it){if(it.slotType==='custom')return 'cus';return it.slot==='am'?'am':it.slot==='pm'?'pm':'full';}
function bySlot(a,b){var d=slotSortKey(a)-slotSortKey(b);return d||((a.dnum||0)-(b.dnum||0));}
function importedRefs(){return DS.items.filter(function(i){return i.refId;}).map(function(i){return i.refId;});}
function renderBoard(){
  renderPills();renderCapScope();

}
function togglePill(off){

function renderPersonView(area){
  selOffs().forEach(function(off){
    var day=dayOf(off);var items=itemsOn(day);

    var sec=document.createElement('div');sec.id='day_'+off;sec.style.marginBottom='16px';
    var hd=document.createElement('div');hd.className='dayhdr d'+off;
    hd.innerHTML='<span>'+dayLabel(off)+' — 共 '+items.length+' 件 · '+ppl+' 人次</span><span class="spacer"></span><button class="btn sm green" data-man="'+off+'">＋ 手動新增</button>';
    hd.querySelector('[data-man]').onclick=function(){addManual(off);};
    sec.appendChild(hd);
    var by={};items.forEach(function(it){(it.assignees||[]).forEach(function(a){(by[a.personId]=by[a.personId]||[]).push(it);});});
    var pids=Object.keys(by);
    pids.sort(function(a,b){
      var ea=Math.min.apply(null,by[a].map(slotSortKey)),eb=Math.min.apply(null,by[b].map(slotSortKey));
      if(ea!==eb)return ea-eb;
      var pa=personById(a),pb=personById(b);
      var fa=pa&&pa.foreman?1:0,fb=pb&&pb.foreman?1:0;
      if(fa!==fb)return fb-fa;
      return DS.people.indexOf(pa)-DS.people.indexOf(pb);
    });
    if(DS.view==='list'){sec.appendChild(personTable(day,pids,by));}
    else{
      if(!pids.length){var e=document.createElement('div');e.className='muted';e.style.cssText='padding:6px 4px 10px';e.textContent='（尚無指派）';sec.appendChild(e);}
      pids.forEach(function(pid){sec.appendChild(personRow(pid,by[pid]));});
      var un=items.filter(function(it){return !(it.assignees||[]).length;}).sort(bySlot);
      if(un.length){var ub=document.createElement('div');ub.className='unassigned';ub.innerHTML='<div style="font-weight:700;color:#9a3412;margin-bottom:6px">⚠ 未指派（'+un.length+'）</div>';un.forEach(function(it){ub.appendChild(pitemChip(it));});sec.appendChild(ub);}

    '<div style="font-weight:700">'+esc(p?p.name:'(已刪除)')+(p&&p.foreman?' <span class="star">★</span>':'')+(p&&p.migrant?' <span class="badge">移工</span>':'')+'</div>'+

function dueDiff(due){return Math.round((parseISO(due)-parseISO(todayISO()))/86400000);}
function renderStaging(){
  var body=document.getElementById('stgBody');body.innerHTML='';
  document.getElementById('stgDays').value=String(DS.candDays||3);
  var q=(document.getElementById('stgSearch').value||'').trim();var sort=document.getElementById('stgSort').value;var imp=importedRefs();
  var N=+(DS.candDays||3);
  var live=_g95Cands();
  var list=(live||DS.candidates).filter(function(c){return imp.indexOf(c.refId)<0&&dueDiff(c.due)<=N;});
  if(q)list=list.filter(function(c){return (c.unit+c.vendor+c.content+(c.note||'')+c.refId).indexOf(q)>=0;});
  list.sort(function(a,b){if(sort==='unit')return unitCompare(a.unit,b.unit);if(sort==='vendor')return a.vendor.localeCompare(b.vendor);return a.due.localeCompare(b.due);});
  document.getElementById('stgTitle').textContent='📋 待帶入工作（'+list.length+'）'+(live?' · G95 即時':' · 示範資料');

  chips.innerHTML='<button class="rchip ri'+(_stgColl['初驗']?' off':'')+'">🔵 初驗（'+nI+'）</button><button class="rchip rr'+(_stgColl['複驗']?' off':'')+'">🟣 複驗（'+nR+'）</button>';
  chips.querySelector('.ri').onclick=function(){_stgColl['初驗']=!_stgColl['初驗'];renderStaging();};
  chips.querySelector('.rr').onclick=function(){_stgColl['複驗']=!_stgColl['複驗'];renderStaging();};
  body.appendChild(chips);

function sheetDates(){

  var all=Object.keys(set);
  var fut=all.filter(function(d){return d>=t;}).sort();
  var past=all.filter(function(d){return d<t;}).sort().reverse();
  return {fut:fut,past:past};
}
function fmtDay(d){return d.slice(5).replace('-','/')+'('+wd(d)+')';}
function renderSheet(){

}

      '<div class="muted" style="font-size:12.5px;margin:6px 0">'+its.length+'件 · '+ppl+'人次'+(done?' · ✓完成'+done:'')+'</div>'+

function capTarget(scope){if(scope==='all')return document.getElementById('capArea');var el=document.getElementById('day_'+scope);return el||document.getElementById('capArea');}
function scopeName(scope){return scope==='all'?'全選':dayOf(+scope);}
function doCapture(){var scope=document.getElementById('capScope').value;withClean(function(done){html2canvas(capTarget(scope),{scale:2,backgroundColor:'#f3f4f6'}).then(function(c){var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='派遣單_'+scopeName(scope)+'_'+todayISO()+'.png';a.click();done();},function(){done();});});}
function doPdf(){var scope=document.getElementById('capScope').value;withClean(function(done){html2canvas(capTarget(scope),{scale:2,backgroundColor:'#ffffff'}).then(function(c){var jsPDF=window.jspdf.jsPDF;var pdf=new jsPDF('p','mm','a4');var w=190,h=c.height*w/c.width;pdf.addImage(c.toDataURL('image/jpeg',0.92),'JPEG',10,10,w,h);pdf.save('派遣單_'+scopeName(scope)+'_'+todayISO()+'.pdf');done();},function(){done();});});}

function openModal(){document.getElementById('modalMask').classList.add('on');}
function closeModal(){document.getElementById('modalMask').classList.remove('on');}
document.getElementById('modalMask').onclick=function(e){if(e.target===this)closeModal();};

function migrate(){
  if(!DS.selDays||!DS.selDays.length)DS.selDays=[0,1];
  if(!DS.viewMode)DS.viewMode='work';
  if(!DS.candDays)DS.candDays=3;
  if(!DS.layout)DS.layout='row';
  if(!DS.groups)DS.groups=seed().groups;
  if(!DS.machineFields)DS.machineFields=[];
  if(!DS.managers)DS.managers=seed().managers;
  (DS.machines||[]).forEach(function(m){if(m.keeper===undefined)m.keeper='';if(m.loc===undefined)m.loc='';if(m.needCert===undefined)m.needCert=/需證照/.test(m.note||'');if(!m.custom)m.custom={};});
  var cutoff=addDays(todayISO(),-10);
  DS.items=(DS.items||[]).filter(function(it){return !it.day||it.day>=cutoff;});
  if(DS.vendors&&DS.vendors.length&&typeof DS.vendors[0]==='object'){DS.vendors=DS.vendors.map(function(v){return (v.code||'')+(v.name||'')+'('+(v.type||'')+')';});}
  if(!DS.candidates||!DS.candidates.length||!DS.candidates[0].round){DS.candidates=seed().candidates;}
  if(!DS.serial){DS.serial=1;var seen={};(DS.items||[]).forEach(function(it){if(it.dnum){if(it.dnum>=DS.serial)DS.serial=it.dnum+1;return;}if(it.crossId&&seen[it.crossId]){it.dnum=seen[it.crossId];return;}it.dnum=DS.serial++;if(it.crossId)seen[it.crossId]=it.dnum;});}
  delete DS.boardDay;delete DS.baseDate;
}
var _curDay=null;
function boot(){
  DS=load();if(!DS){DS=seed();}
  migrate();save();
  _curDay=todayISO();
  // 登入(V1.0):Google 彈窗+轉頁 fallback;連不上雲端 6 秒後開放離線試用
  document.getElementById('loginBtn').onclick=function(){
    document.getElementById('loginStatus').textContent='開啟 Google 登入視窗…';
    window._authSignInGoogle().catch(function(e){
      console.warn('[auth] popup',e);
      document.getElementById('loginStatus').textContent='彈窗被擋，改用轉頁登入…';
      window._authSignInGoogleRedirect().catch(function(e2){
        document.getElementById('loginStatus').textContent='登入失敗：'+((e2&&e2.code)||e2);
      });
    });
  };
  document.getElementById('loginLocalBtn').onclick=function(){
    DS.user='離線測試';save();
    document.getElementById('loginMask').classList.remove('on');
    document.getElementById('who').textContent='Hi, 離線測試（僅本機）';
    document.getElementById('logoutBtn').style.display='';
    renderBoard();
  };
  window._fbReadyCb=function(){
    document.getElementById('loginStatus').textContent='請用 Google 登入（與 G95 同帳號）';
    window._onAuth(function(u){
      if(!u){document.getElementById('loginMask').classList.add('on');return;}
      _userEmail=u.email||'';_allowed=_loginAllowed(_userEmail);
      if(!_allowed){
        _readonly=true;
        var b=document.getElementById('roBanner');b.style.display='';
        b.textContent='👁 唯讀模式：此帳號（'+_userEmail+'）不在寫入名單，改動不會存到雲端。';
      }
      DS.user=u.displayName||_userEmail;save();
      document.getElementById('loginMask').classList.remove('on');
      document.getElementById('who').textContent='Hi, '+DS.user+(_allowed?'':'（唯讀）');
      document.getElementById('logoutBtn').style.display='';
      _cloudBoot();renderBoard();
    });
  };
  if(window._fbReady)window._fbReadyCb();
  setTimeout(function(){
    if(!window._fbReady){
      document.getElementById('loginStatus').textContent='⚠ 連不上雲端（離線或 CDN 被擋）';
      document.getElementById('loginLocalBtn').style.display='';
    }
  },6000);
  document.querySelectorAll('.navitem').forEach(function(t){t.onclick=function(){switchTab(t.dataset.tab);};});
  document.getElementById('addPerson').onclick=function(){editPerson('');};
  document.getElementById('expandAll').onclick=function(){document.querySelectorAll('.pcard').forEach(function(c){c.classList.add('open');});};
  document.getElementById('collapseAll').onclick=function(){document.querySelectorAll('.pcard').forEach(function(c){c.classList.remove('open');});};
  document.getElementById('addMachine').onclick=function(){editMachine('');};
  document.querySelectorAll('#viewSeg button').forEach(function(b){b.onclick=function(){DS.view=b.dataset.v;save();renderBoard();};});
  document.querySelectorAll('#vmSeg button').forEach(function(b){b.onclick=function(){DS.viewMode=b.dataset.vm;save();renderBoard();};});
  document.getElementById('layoutBtn').onclick=function(){DS.layout=(DS.layout==='col'?'row':'col');save();renderBoard();};
  document.getElementById('grpBtn').onclick=manageGroups;
  if(new Date().getDay()===1&&DS.bkWeek!==_weekKey()){document.getElementById('bkBanner').style.display='';}
  document.getElementById('bkNow').onclick=backupNow;
  document.getElementById('bkLater').onclick=function(){document.getElementById('bkBanner').style.display='none';};
  document.getElementById('stgSearch').oninput=renderStaging;
  document.getElementById('stgSort').onchange=renderStaging;
  document.getElementById('stgDays').onchange=function(){DS.candDays=+this.value||3;save();renderStaging();};
  document.getElementById('stgToggle').onclick=function(){var c=document.getElementById('stgBody');var on=c.style.display==='none';c.style.display=on?'':'none';this.textContent=on?'收合':'展開';};
  document.getElementById('exportPdf').onclick=doPdf;
  document.getElementById('capBtn').onclick=doCapture;
  document.getElementById('logoutBtn').onclick=function(){
    DS.user=null;save();
    if(window._authSignOut){window._authSignOut().then(function(){location.reload();},function(){location.reload();});}
    else{location.reload();}
  };
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&_curDay!==todayISO()){_curDay=todayISO();renderBoard();}});
  window.addEventListener('focus',function(){if(_curDay!==todayISO()){_curDay=todayISO();renderBoard();}});
  renderBoard();
}
boot();
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
